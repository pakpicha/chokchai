<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="โชคชัย">
<meta name="theme-color" content="#1a3a2a">
<link rel="apple-touch-icon" href="icon.svg">
<title>โชคชัย เงินด่วน — เอกสาร</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sarabun','TH Sarabun New',Arial,sans-serif;background:#f0f0eb;min-height:100vh}

/* ── MAIN MENU ── */
#main-menu{padding:16px;max-width:600px;margin:0 auto}
.head{background:#1a3a2a;color:#fff;padding:20px;border-radius:14px;margin-bottom:16px;text-align:center}
.head h1{font-size:20px;font-weight:700}
.head p{font-size:13px;opacity:.7;margin-top:4px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.card{background:#fff;border-radius:14px;padding:20px 14px;text-align:center;color:inherit;display:flex;flex-direction:column;align-items:center;border:1px solid #e0e0d8;-webkit-tap-highlight-color:transparent;cursor:pointer;text-decoration:none}
.card:active{background:#e8f5e8;transform:scale(.97)}
.ic{font-size:36px;margin-bottom:10px}
.lbl{font-size:15px;font-weight:700;color:#1a3a2a}
.sub{font-size:11px;color:#888;margin-top:5px;line-height:1.4}
.tip{background:#fff8e1;border-radius:10px;padding:14px;margin-top:14px;font-size:13px;color:#555;border:1px solid #ffe082}
.tip strong{color:#e65100}

/* ── SUB-MENU SHEET ── */
.backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100}
.backdrop.show{display:block}
.sheet{
  position:fixed;bottom:0;left:0;right:0;z-index:101;
  background:#f0f0eb;border-radius:22px 22px 0 0;
  padding:0 16px 44px;
  transform:translateY(100%);
  transition:transform .28s cubic-bezier(.4,0,.2,1);
  max-width:600px;margin:0 auto;
}
.sheet.open{transform:translateY(0)}
.sheet-handle{width:40px;height:4px;background:#ccc;border-radius:2px;margin:12px auto 16px}
.sheet-title{font-size:18px;font-weight:800;color:#1a3a2a;margin-bottom:14px}
.mi{
  background:#fff;border-radius:13px;padding:16px 14px;
  display:flex;align-items:center;gap:14px;
  text-decoration:none;color:inherit;
  margin-bottom:10px;border:1px solid #e0e0d8;
  -webkit-tap-highlight-color:transparent;cursor:pointer;
}
.mi:active{background:#e8f5e8;transform:scale(.98)}
.mi-ic{font-size:26px;flex-shrink:0;width:34px;text-align:center}
.mi-lbl{font-size:15px;font-weight:700;color:#1a3a2a}
.mi-sub{font-size:11px;color:#888;margin-top:3px;line-height:1.4}
.mi-arr{color:#bbb;font-size:20px;margin-left:auto;flex-shrink:0}
</style>
</head>
<body>

<div id="main-menu">
  <div class="head">
    <h1>บริษัท โชคชัย เงินด่วน จำกัด</h1>
    <p>ระบบสร้างเอกสารสินเชื่อ</p>
  </div>

  <div class="grid">
    <a class="card" href="ประชุม.html">
      <div class="ic">📋</div>
      <div class="lbl">รายงานการประชุม</div>
      <div class="sub">สร้างเอกสารประชุมพิจารณาสินเชื่อ</div>
    </a>
    <a class="card" href="จำนอง.html">
      <div class="ic">📄</div>
      <div class="lbl">จดจำนอง</div>
      <div class="sub">บันทึกข้อตกลง • ต่อท้าย • ใบจ่าย</div>
    </a>
    <a class="card" href="ขายฝาก.html">
      <div class="ic">🏡</div>
      <div class="lbl">ขายฝาก</div>
      <div class="sub">ทด.16 • ใบสำคัญจ่าย</div>
    </a>
    <a class="card" href="กรรมการ.html">
      <div class="ic">💼</div>
      <div class="lbl">กู้เงินกรรมการ</div>
      <div class="sub">ตั๋วจะใช้เงิน • ใบสำคัญจ่าย</div>
    </a>
  </div>

  <div class="tip">
    <strong>วิธีปริ้น:</strong> เปิดหน้าเอกสาร → กรอกข้อมูล → กด <strong>แชร์ (□↑) → Print</strong>
  </div>
</div>

<!-- BOTTOM SHEET สำหรับ จำนอง / ขายฝาก -->
<div class="backdrop" id="bd" onclick="closeSheet()"></div>
<div class="sheet" id="sh">
  <div class="sheet-handle"></div>
  <div class="sheet-title" id="sh-title"></div>
  <div id="sh-body"></div>
</div>

<script>
var MENUS = {
  'จำนอง': {
    t: '📄 จดจำนอง',
    items: [
      {ic:'📝', url:'จำนอง.html', l:'บันทึกข้อตกลง', s:'สัญญาจดจำนองที่ดินระหว่างบริษัทกับผู้จำนอง'},
      {ic:'📋', url:'จำนอง.html', l:'บันทึกข้อตกลงต่อท้ายสัญญา', s:'เอกสารต่อท้ายสัญญาจำนอง'},
      {ic:'💰', url:'จำนอง.html', l:'ใบสำคัญจ่าย', s:'หลักฐานการรับเงินจากการจดจำนอง'},
    ]
  },
  'ขายฝาก': {
    t: '🏡 ขายฝาก',
    items: [
      {ic:'💰', url:'ขายฝาก.html', l:'ขายฝาก', s:'ทด.16 • ใบสำคัญจ่าย'},
    ]
  }
};

function openSheet(key) {
  var m = MENUS[key];
  if(!m) return;
  document.getElementById('sh-title').textContent = m.t;
  var h = '';
  m.items.forEach(function(x){
    h += '<a class="mi" href="'+x.url+'">';
    h += '<div class="mi-ic">'+x.ic+'</div>';
    h += '<div style="flex:1"><div class="mi-lbl">'+x.l+'</div><div class="mi-sub">'+x.s+'</div></div>';
    h += '<div class="mi-arr">›</div></a>';
  });
  document.getElementById('sh-body').innerHTML = h;
  document.getElementById('bd').classList.add('show');
  requestAnimationFrame(function(){
    requestAnimationFrame(function(){
      document.getElementById('sh').classList.add('open');
    });
  });
}

function closeSheet() {
  document.getElementById('sh').classList.remove('open');
  document.getElementById('bd').classList.remove('show');
}
</script>
</body>
</html>
