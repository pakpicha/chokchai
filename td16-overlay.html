<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>ทด.16 — บันทึกถ้อยคำ</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sarabun','TH Sarabun New',Arial,sans-serif;background:#f0f0eb;color:#111;min-height:100vh}
.nav{background:#1a3a2a;color:#fff;padding:10px 14px;display:flex;align-items:center;gap:8px;position:sticky;top:0;z-index:200}
.nav-title{font-size:15px;font-weight:700;flex:1}
.nav-sub{font-size:10px;opacity:.7;margin-top:1px}
.mode-toggle{display:flex;background:#0f2218;border-radius:8px;padding:3px;gap:2px}
.mode-btn{padding:6px 11px;border-radius:6px;border:none;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;color:#aaa;background:none;transition:all .2s;white-space:nowrap}
.mode-btn.active{background:#2d7a4f;color:#fff}
.back-btn{background:none;border:none;color:#ccc;font-size:13px;font-family:inherit;cursor:pointer;padding:0 4px}
.back-btn:hover{color:#fff}
.app{display:flex;height:calc(100vh - 50px)}
.left{width:300px;flex-shrink:0;background:#fff;border-right:1px solid #ddd;overflow-y:auto}
.left-body{padding:12px}
/* fill */
.fg{margin-bottom:8px}
.fg label{display:flex;align-items:center;gap:4px;font-size:11px;color:#555;font-weight:700;margin-bottom:3px}
.badge{font-size:9px;border-radius:3px;padding:1px 4px;font-weight:700}
.badge-multi{background:#e3f2fd;color:#1565c0;border:1px solid #90caf9}
.fg input{width:100%;padding:8px 10px;font-size:14px;border:1px solid #ccc;border-radius:7px;font-family:inherit;background:#fafaf7}
.fg input:focus{outline:none;border-color:#1a3a2a;background:#fff}
.btn-green{background:#1a3a2a;color:#fff;border:none;padding:12px;border-radius:9px;font-size:14px;font-family:inherit;font-weight:700;width:100%;cursor:pointer;margin-top:6px}
.btn-red{background:#fff;color:#c00;border:1px solid #fcc;padding:9px;border-radius:9px;font-size:13px;font-family:inherit;font-weight:700;width:100%;cursor:pointer;margin-top:6px}
/* setup */
.hint{background:#e8f5e9;border:1px solid #a5d6a7;border-radius:8px;padding:9px;font-size:11px;color:#1b5e20;margin-bottom:10px;line-height:1.6}
.hint b{font-size:12px;display:block;margin-bottom:3px}
.pg-tabs{display:flex;gap:5px;margin-bottom:10px}
.pg-tab{flex:1;padding:7px;border:1px solid #ccc;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;background:#fff;color:#555;text-align:center}
.pg-tab.on{background:#1a3a2a;color:#fff;border-color:#1a3a2a}
/* field items */
.fi{border:1px solid #e0e0e0;border-radius:8px;margin-bottom:5px;background:#fafafa;overflow:hidden}
.fi.has-pin .fi-head{border-left:3px solid #2d7a4f}
.fi.waiting .fi-head{border-left:3px solid #e65100;background:#fff3e0}
.fi.drag-over{box-shadow:0 0 0 2px #2d7a4f}
.fi.dragging{opacity:.4}
.fi-head{display:flex;align-items:center;gap:6px;padding:7px 9px;cursor:pointer;user-select:none}
.fi-head:hover{background:#f0faf5}
.fi-hidden{opacity:.45}
.fi-hidden .fi-head{background:#f9f9f9}
.fi-handle{color:#bbb;font-size:16px;cursor:grab}
.fi-name{font-size:13px;font-weight:700;flex:1;color:#111}
.fi-badge{font-size:10px;font-weight:700;padding:2px 5px;border-radius:4px;white-space:nowrap}
.fi-badge.ok{background:#e8f5e9;color:#2e7d32}
.fi-badge.many{background:#e3f2fd;color:#1565c0}
.fi-badge.no{background:#f5f5f5;color:#aaa}
.fi-body{padding:8px 10px;border-top:1px solid #f0f0f0;background:#fff;display:none}
.fi-body.open{display:block}
/* fixed row */
.fix-row{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.fix-chk{width:15px;height:15px;accent-color:#2d7a4f;cursor:pointer;flex-shrink:0}
.fix-lbl{font-size:12px;color:#333;cursor:pointer}
.fix-inp{width:100%;padding:6px 8px;font-size:13px;border:1px solid #a5d6a7;border-radius:6px;font-family:inherit;background:#f0faf0;margin-bottom:6px}
.fix-inp:focus{outline:none;border-color:#2d7a4f}
.fix-inp:disabled{background:#f5f5f5;color:#aaa;border-color:#ddd}
.fix-inp.saved{border-color:#2d7a4f;background:#e8f5e9}
/* pin rows */
.pin-row{background:#f5faf5;border:1px solid #ddeedd;border-radius:6px;padding:6px 8px;margin-bottom:4px}
.pin-top{display:flex;align-items:center;gap:4px;margin-bottom:5px}
.pin-lbl{font-size:11px;font-weight:700;color:#1a3a2a;flex:1}
.pin-mv{background:#1a3a2a;color:#fff;border:none;padding:3px 8px;border-radius:5px;font-size:10px;font-family:inherit;font-weight:700;cursor:pointer}
.pin-del{background:none;border:none;color:#e53935;cursor:pointer;font-size:16px;padding:0 2px;line-height:1}
.pin-ctrls{display:flex;flex-wrap:wrap;gap:4px;align-items:center}
.ctrl{display:flex;align-items:center;gap:3px}
.ctrl-lbl{font-size:10px;color:#777}
.cbtn{width:22px;height:22px;border:1px solid #ccc;border-radius:4px;background:#fff;cursor:pointer;font-size:13px;line-height:1;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.cbtn:hover{background:#e8f5e9;border-color:#2d7a4f}
.cval{font-size:11px;min-width:26px;text-align:center}
.font-sel{padding:3px 5px;font-size:11px;border:1px solid #ccc;border-radius:5px;font-family:inherit;background:#fff;max-width:140px}
.add-pin-btn{background:#1a3a2a;color:#fff;border:none;padding:7px 10px;border-radius:6px;font-size:12px;font-family:inherit;font-weight:700;cursor:pointer;margin-top:6px;width:100%}
.add-pin-btn.waiting{background:#e65100;animation:pulse .8s infinite alternate}
@keyframes pulse{from{opacity:1}to{opacity:.7}}
/* add custom */
.add-box{border:1.5px dashed #2d7a4f;border-radius:8px;padding:10px;margin-bottom:8px}
.add-box-title{font-size:11px;font-weight:800;color:#1a3a2a;margin-bottom:8px}
.add-box input{width:100%;padding:7px 9px;font-size:13px;border:1px solid #ccc;border-radius:6px;font-family:inherit;margin-bottom:6px}
.add-box input:focus{outline:none;border-color:#1a3a2a}
.add-box-row{display:flex;gap:5px}
.add-box-row select{flex:1;padding:7px;border:1px solid #ccc;border-radius:6px;font-size:12px;font-family:inherit;background:#fff}
.add-box-row button{background:#2d7a4f;color:#fff;border:none;padding:7px 14px;border-radius:6px;font-size:13px;font-family:inherit;font-weight:700;cursor:pointer}
.save-btn{background:#1a3a2a;color:#fff;border:none;padding:11px;border-radius:8px;font-size:14px;font-family:inherit;font-weight:700;width:100%;cursor:pointer;margin-top:8px}
.reset-btn{background:#fff;color:#c00;border:1px solid #fcc;padding:9px;border-radius:8px;font-size:12px;font-family:inherit;font-weight:700;width:100%;cursor:pointer;margin-top:5px}
/* pages */
.pages{flex:1;overflow:auto;background:#888;padding:16px;display:flex;flex-direction:column;align-items:center;gap:20px}
.pg-wrap{position:relative;display:inline-block;box-shadow:0 4px 20px rgba(0,0,0,.4)}
.pg-wrap img{display:block;max-width:100%;user-select:none;-webkit-user-drag:none}
.overlay{position:absolute;inset:0;cursor:crosshair;z-index:10;display:none}
.overlay.on{display:block}
/* placed boxes */
.pbox{position:absolute;z-index:20;user-select:none}
.pbox-txt{display:block;font-weight:600;white-space:nowrap;line-height:1.3;overflow:hidden;min-width:20px;min-height:18px}
.pbox-txt.empty{color:#ccc}
.pbox-txt.fixed{color:#1b5e20;font-weight:700}
.pbox-del{position:absolute;top:-11px;right:-11px;width:20px;height:20px;background:#e53935;color:#fff;border:none;border-radius:50%;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:40;padding:0;display:none}
.pbox-lbl{position:absolute;top:-17px;left:0;font-size:9px;color:#2d7a4f;font-weight:700;white-space:nowrap;background:rgba(255,255,255,.85);padding:0 3px;border-radius:2px;pointer-events:none;display:none}
.pbox-res{position:absolute;right:-4px;top:0;bottom:0;width:8px;cursor:ew-resize;z-index:30;display:none}
.pbox-res::after{content:'';position:absolute;right:1px;top:20%;bottom:20%;width:3px;background:#2d7a4f;border-radius:2px;opacity:.6}
.setup-mode .pbox-txt{border:1.5px solid rgba(45,122,79,.4);border-radius:2px;background:rgba(255,255,255,.65);padding:1px 4px}
.setup-mode .pbox-txt.fixed{border-color:rgba(27,94,32,.5);background:rgba(240,250,240,.8)}
.setup-mode .pbox-del,.setup-mode .pbox-lbl,.setup-mode .pbox-res{display:flex}
.setup-mode .pbox-lbl,.setup-mode .pbox-res{display:block}
@media print{
  @page{margin:0mm}
  .nav,.left{display:none!important}
  .app{height:auto;display:block}
  .pages{background:#fff;padding:0;gap:0}
  .pg-wrap{box-shadow:none;page-break-after:always;width:100%}
  .pg-wrap img{width:100%;height:auto;display:block}
  .pbox-del,.pbox-lbl,.pbox-res,.overlay{display:none!important}
  .pbox-txt{border:none!important;background:transparent!important;padding:0!important}
  body,html{background:#fff;margin:0;padding:0}
}

.del-field-btn{background:#fff;color:#c00;border:1px solid #fcc;padding:6px;border-radius:6px;font-size:11px;cursor:pointer;width:100%;margin-top:4px;font-family:inherit}
.del-field-btn:hover{background:#fff0f0}
</style>
</head>

<div class="nav">
  <button class="back-btn" onclick="location.href='index.html'">← กลับ</button>
  <div style="flex:1;padding-left:6px">
    <div class="nav-title">บันทึกถ้อยคำ (ท.ด.16)</div>
    <div class="nav-sub" id="nav-sub">โหลด...</div>
  </div>
  <div class="mode-toggle">
    <button class="mode-btn" id="btn-fill" onclick="setMode('fill')">✏️ กรอก</button>
    <button class="mode-btn" id="btn-setup" onclick="setMode('setup')">📌 ปักตำแหน่ง</button>
  </div>
</div>

<div class="app">
  <div class="left" id="left">
    <div id="fill-panel" class="left-body">
      <div id="fill-list"></div>
      <button class="btn-green" onclick="doPrint()">🖨️ พรีวิว / พิมพ์</button>
      <button class="btn-red" onclick="doClear()">🗑️ ล้างข้อมูล</button>
    </div>
    <div id="setup-panel" class="left-body" style="display:none">
      <div class="hint">
        <b>📌 วิธีใช้</b>
        ลาก ☰ จัดลำดับช่อง<br>
        กดขยาย → <b>📍 เพิ่มจุดใหม่</b> → คลิกบนแบบฟอร์ม<br>
        ปรับฟ้อน/ขนาด/กว้าง ต่อจุด<br>
        ✅ ค่าตายตัว = ไม่ขึ้นในหน้ากรอก บันทึกตลอดไป
      </div>

      <!-- GLOBAL FONT/SIZE -->
      <div style="background:#f0faf5;border:1px solid #a5d6a7;border-radius:8px;padding:10px;margin-bottom:10px">
        <div style="font-size:11px;font-weight:800;color:#1a3a2a;margin-bottom:8px">🌐 ตั้งค่าทุกจุดพร้อมกัน</div>
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px">
          <span style="font-size:11px;color:#555;width:50px;flex-shrink:0">ฟ้อน</span>
          <select id="global-font" style="flex:1;padding:5px 7px;font-size:12px;border:1px solid #ccc;border-radius:6px;font-family:inherit;background:#fff" onchange="applyGlobalFont(this.value)">
            <option value="Sarabun,sans-serif">Sarabun</option>
            <option value="TH Sarabun New,serif">TH Sarabun New</option>
            <option value="Angsana New,serif">Angsana New</option>
            <option value="Cordia New,sans-serif">Cordia New</option>
            <option value="Tahoma,sans-serif">Tahoma</option>
            <option value="Arial,sans-serif">Arial</option>
            <option value="Times New Roman,serif">Times New Roman</option>
            <option value="Courier New,monospace">Courier New</option>
          </select>
        </div>
        <div style="display:flex;align-items:center;gap:6px">
          <span style="font-size:11px;color:#555;width:50px;flex-shrink:0">ขนาด</span>
          <button onclick="applyGlobalSize(-1)" style="width:28px;height:28px;border:1px solid #ccc;border-radius:5px;background:#fff;cursor:pointer;font-size:15px;font-family:inherit">−</button>
          <span id="global-size-val" style="font-size:13px;font-weight:700;min-width:30px;text-align:center">13</span>
          <button onclick="applyGlobalSize(1)"  style="width:28px;height:28px;border:1px solid #ccc;border-radius:5px;background:#fff;cursor:pointer;font-size:15px;font-family:inherit">+</button>
          <span style="font-size:11px;color:#aaa">px — กดเพื่อใช้กับทุกจุด</span>
        </div>
      </div>
      <div id="field-list"></div>
      <div class="add-box">
        <div class="add-box-title">➕ เพิ่มช่องกรอกเอง</div>
        <input type="text" id="new-label" placeholder="ชื่อช่อง...">
        <div class="add-box-row">
          <button onclick="addCustomField()" style="width:100%">+ เพิ่ม</button>
        </div>
      </div>
      <div id="trash-section"></div>
      <button class="save-btn" onclick="saveAll2()">💾 บันทึก Layout</button>
      <button class="reset-btn" onclick="resetAll()">🔄 รีเซ็ต Layout ทั้งหมด</button>
    </div>
  </div>

  <div class="pages" id="pages">
    <div class="pg-wrap" id="pg1">
      <img id="img1" src="" draggable="false">
      <div class="overlay" id="ov1"></div>
    </div>
    <div class="pg-wrap" id="pg2">
      <img id="img2" src="" draggable="false">
      <div class="overlay" id="ov2"></div>
    </div>
  </div>
</div>

// ── HELPERS ──
function allFields(){
  // BF minus deleted, plus custom
  var active = BF.filter(function(f){ return !deleted[f.k]; });
  return active.concat(custom);
}
function orderedFields(){
  var all = allFields();
  var known = order.filter(function(k){ return all.some(function(f){ return f.k===k; }); });
  var extra = all.filter(function(f){ return known.indexOf(f.k)===-1; }).map(function(f){ return f.k; });
  return known.concat(extra).map(function(k){ return all.find(function(f){ return f.k===k; }); }).filter(Boolean);
}
function getVal(k){
  if(fixed[k]!==undefined) return fixed[k];
  if(values[k]!==undefined) return values[k];
  return DV[k]||'';
}
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }

// ── STORAGE ──
function lsGet(key,def){ try{ var v=localStorage.getItem(key); return v?JSON.parse(v):def; }catch(e){ return def; } }
function lsSet(key,val){ try{ localStorage.setItem(key,JSON.stringify(val)); }catch(e){} }

function load(){
  layout  = lsGet(LS.layout, {});
  values  = lsGet(LS.values, {});
  fixed   = lsGet(LS.fixed,  {});
  custom  = lsGet(LS.custom, []);
  order   = lsGet(LS.order,  []);
  deleted = lsGet(LS.deleted,{});
  // normalise pins
  Object.keys(layout).forEach(function(k){
    if(!Array.isArray(layout[k])) layout[k]=[layout[k]];
    layout[k].forEach(function(p){
      if(!p.ff) p.ff=FONTS[0].v;
      if(!p.fs) p.fs=13;
      if(!p.w)  p.w=120;
    });
  });
}

function saveAll(){
  lsSet(LS.layout,  layout);
  lsSet(LS.fixed,   fixed);
  lsSet(LS.custom,  custom);
  lsSet(LS.order,   order);
  lsSet(LS.deleted, deleted);
  updateStatus();
}

function autoSave(){ saveAll(); }

var globalSize = 13;

function applyGlobalFont(ff){
  Object.keys(layout).forEach(function(k){
    if(!layout[k]) return;
    layout[k].forEach(function(pin){ pin.ff = ff; });
  });
  autoSave(); renderBoxes(); renderList();
}

function applyGlobalSize(delta){
  globalSize = Math.max(8, Math.min(36, globalSize + delta));
  document.getElementById('global-size-val').textContent = globalSize;
  Object.keys(layout).forEach(function(k){
    if(!layout[k]) return;
    layout[k].forEach(function(pin){ pin.fs = globalSize; });
  });
  autoSave(); renderBoxes(); renderList();
}

function onOvClick(e, pg){
  if(!placing||!placeKey) return;
  var wrap=document.getElementById('pg'+pg);
  var img=document.getElementById('img'+pg);
  var rect=wrap.getBoundingClientRect();
  var xp=(e.clientX-rect.left)/img.clientWidth;
  var yp=(e.clientY-rect.top)/img.clientHeight;
  if(!layout[placeKey]) layout[placeKey]=[];
  var pin={page:pg,xp:xp,yp:yp,w:120,fs:13,ff:FONTS[0].v};
  if(placeIdx!==null && layout[placeKey][placeIdx]){
    var old=layout[placeKey][placeIdx];
    old.xp=xp; old.yp=yp; old.page=pg;
  } else {
    layout[placeKey].push(pin);
  }
  placing=false; placeKey=null; placeIdx=null;
  document.getElementById('ov1').classList.remove('on');
  document.getElementById('ov2').classList.remove('on');
  autoSave(); renderBoxes(); renderList();
}

function updateStatus(){
  var placed=Object.keys(layout).filter(function(k){ return layout[k]&&layout[k].length; }).length;
  var pins=Object.keys(layout).reduce(function(s,k){ return s+(layout[k]?layout[k].length:0); },0);
  document.getElementById('nav-sub').textContent=placed+'/'+allFields().length+' ช่อง, '+pins+' จุด';
}

// ── MODE ──
function setMode(m){
  mode=m;
  document.getElementById('btn-fill').classList.toggle('active',m==='fill');
  document.getElementById('btn-setup').classList.toggle('active',m==='setup');
  document.getElementById('fill-panel').style.display=m==='fill'?'block':'none';
  document.getElementById('setup-panel').style.display=m==='setup'?'block':'none';
  document.getElementById('pages').classList.toggle('setup-mode',m==='setup');
  if(m==='setup'){
    document.getElementById('ov1').classList.add('on');
    document.getElementById('ov2').classList.add('on');
    renderList();
  } else {
    document.getElementById('ov1').classList.remove('on');
    document.getElementById('ov2').classList.remove('on');
    placing=false;
    renderFill();
  }
  renderBoxes();
}

function renderFill(){
  var Q="'";

  orderedFields().forEach(function(f){
    if(fixed[f.k]!==undefined) return;

    var pins=layout[f.k]?layout[f.k].length:0;
    html+='<div class="fg">';
    html+='<label>'+esc(f.l)+(pins>1?' <span class="badge badge-multi">'+pins+' จุด</span>':'')+' </label>';
    html+='<input type="text" id="fi_'+f.k+'" value="'+esc(v)+'" placeholder="'+esc(f.l)+'..." oninput="onInput('+Q+f.k+Q+',this.value)">';
    html+='</div>';
  });
  document.getElementById('fill-list').innerHTML=html;
}

function onInput(k,v){
  values[k]=v;
  lsSet(LS.values,values);
  document.querySelectorAll('.pbox[data-k="'+k+'"]').forEach(function(box){
    var txt=box.querySelector('.pbox-txt');
    if(txt){ txt.textContent=v; txt.classList.toggle('empty',!v); }
  });
}

// ── SETUP LIST ──
function renderList(){
  var Q="'";
  var fields=orderedFields();
  var html='';
  fields.forEach(function(f){
    var pins=layout[f.k]||[];
    var isOpen=openKey===f.k;
    var isWait=placing&&placeKey===f.k;
    var fv=fixed[f.k];
    var hasFx=fv!==undefined;
    var stTxt=pins.length===0?'— ยังไม่ปัก':(pins.length===1?'✓ 1 จุด':'✓ '+pins.length+' จุด');
    var stCls=pins.length===0?'no':(pins.length>1?'many':'ok');

    html+='<div class="fi'+(pins.length?' has-pin':'')+(isWait?' waiting':'')+'" id="fi_'+f.k+'" draggable="true"';
    html+=' ondragstart="dragStart(event,'+Q+f.k+Q+')"';
    html+=' ondragover="dragOver(event,'+Q+f.k+Q+')"';
    html+=' ondrop="dragDrop(event,'+Q+f.k+Q+')"';
    html+=' ondragend="dragEnd()">';
    html+='<div class="fi-head" onclick="toggleOpen('+Q+f.k+Q+')">';
    html+='<span class="fi-handle">☰</span>';
    html+='<span class="fi-name">'+esc(f.l)+(hasFx?' <small style="color:#2e7d32">['+esc(fv)+']</small>':'')+' </span>';
    html+='<span class="fi-badge '+stCls+'">'+stTxt+'</span>';
    html+='</div>';

    html+='<div class="fi-body'+(isOpen?' open':'')+'">';
    // fixed
    html+='<div class="fix-row">';
    html+='<input type="checkbox" class="fix-chk" id="chk_'+f.k+'" '+(hasFx?'checked':'')+' onchange="toggleFixed('+Q+f.k+Q+')">';
    html+='<label class="fix-lbl" for="chk_'+f.k+'">ค่าตายตัว (ไม่ขึ้นในหน้ากรอก)</label>';
    html+='</div>';
    html+='<input type="text" class="fix-inp'+(hasFx?' saved':'')+'" id="fxinp_'+f.k+'" '+(hasFx?'':'disabled')+' value="'+esc(fv||'')+'" placeholder="พิมพ์ค่าตายตัว..." oninput="onFixed('+Q+f.k+Q+',this.value)">';

    // pins
    pins.forEach(function(pin,i){
      var fs=pin.fs||13; var ff=pin.ff||FONTS[0].v; var w=pin.w||120;
      var foHtml=FONTS.map(function(fo){ return '<option value="'+fo.v+'"'+(fo.v===ff?' selected':'')+'>'+fo.n+'</option>'; }).join('');
      html+='<div class="pin-row">';
      html+='<div class="pin-top"><span class="pin-lbl">📍 จุด '+(i+1)+' — หน้า '+pin.page+'</span>';
      html+='<button class="pin-mv" onclick="startPlace('+Q+f.k+Q+','+i+')">ย้าย</button>';
      html+='<button class="pin-del" onclick="removePin('+Q+f.k+Q+','+i+')">×</button></div>';
      html+='<div class="pin-ctrls">';
      html+='<div class="ctrl" style="flex-basis:100%"><span class="ctrl-lbl">ฟ้อน</span><select class="font-sel" onchange="setFont('+Q+f.k+Q+','+i+',this.value)">'+foHtml+'</select></div>';
      html+='<div class="ctrl"><span class="ctrl-lbl">ขนาด</span><button class="cbtn" onclick="chgSize('+Q+f.k+Q+','+i+',-1)">−</button><span class="cval" id="fs_'+f.k+'_'+i+'">'+fs+'</span><button class="cbtn" onclick="chgSize('+Q+f.k+Q+','+i+',1)">+</button></div>';
      html+='<div class="ctrl"><span class="ctrl-lbl">กว้าง</span><input type="range" style="width:70px;accent-color:#1a3a2a" min="40" max="600" value="'+w+'" oninput="setWidth('+Q+f.k+Q+','+i+',this.value)"><span class="cval" id="pw_'+f.k+'_'+i+'">'+w+'</span></div>';
      html+='</div></div>';
    });

    html+='<button class="add-pin-btn'+(isWait?' waiting':'')+'" onclick="startPlace('+Q+f.k+Q+',null)">'+(isWait?'👆 คลิกบนแบบฟอร์ม...':'📍 เพิ่มจุดใหม่')+'</button>';
    html+='<button class="del-field-btn" onclick="delField('+Q+f.k+Q+')">🗑️ ลบช่องนี้</button>';
    html+='</div></div>';
  });
  document.getElementById('field-list').innerHTML=html;
  renderTrash();
}

function toggleOpen(k){ openKey=openKey===k?null:k; renderList(); }

// ── DRAG REORDER ──
function dragStart(e,k){ dragKey=k; e.dataTransfer.effectAllowed='move'; setTimeout(function(){ var el=document.getElementById('fi_'+k); if(el) el.classList.add('dragging'); },0); }
function dragOver(e,k){ e.preventDefault(); document.querySelectorAll('.fi').forEach(function(el){ el.classList.remove('drag-over'); }); if(k!==dragKey){ var el=document.getElementById('fi_'+k); if(el) el.classList.add('drag-over'); } }
function dragDrop(e,k){
  e.preventDefault();
  if(!dragKey||dragKey===k) return;
  var keys=orderedFields().map(function(f){ return f.k; });
  var si=keys.indexOf(dragKey), ti=keys.indexOf(k);
  if(si===-1||ti===-1) return;
  keys.splice(si,1); keys.splice(ti,0,dragKey);
  order=keys; autoSave(); renderList();
}
function dragEnd(){ dragKey=null; document.querySelectorAll('.fi').forEach(function(el){ el.classList.remove('dragging','drag-over'); }); }

// ── PLACE ──
function startPlace(k,idx){
  placeKey=k; placeIdx=idx; placing=true;
  document.getElementById('ov1').classList.add('on');
  document.getElementById('ov2').classList.add('on');
  renderList();
}

// ── PIN CONTROLS ──
function chgSize(k,i,d){ if(!layout[k]||!layout[k][i]) return; var fs=Math.max(8,Math.min(36,(layout[k][i].fs||13)+d)); layout[k][i].fs=fs; var el=document.getElementById('fs_'+k+'_'+i); if(el) el.textContent=fs; autoSave(); renderBoxes(); }
function setWidth(k,i,v){ v=parseInt(v); if(layout[k]&&layout[k][i]) layout[k][i].w=v; var el=document.getElementById('pw_'+k+'_'+i); if(el) el.textContent=v; autoSave(); renderBoxes(); }
function setFont(k,i,v){ if(layout[k]&&layout[k][i]) layout[k][i].ff=v; autoSave(); renderBoxes(); }
function removePin(k,i){ if(!layout[k]) return; layout[k].splice(i,1); if(!layout[k].length) delete layout[k]; autoSave(); renderBoxes(); renderList(); }

// ── FIXED VALUE ──
function toggleFixed(k){
  var chk=document.getElementById('chk_'+k);
  var inp=document.getElementById('fxinp_'+k);
  if(!inp) return;
  if(chk.checked){ fixed[k]=inp.value||''; inp.disabled=false; inp.classList.add('saved'); inp.focus(); }
  else { delete fixed[k]; inp.disabled=true; inp.classList.remove('saved'); renderFill(); }
  autoSave(); renderBoxes();
  var nm=document.querySelector('#fi_'+k+' .fi-name');
  if(nm){ var f=allFields().find(function(f){ return f.k===k; }); if(f) nm.innerHTML=esc(f.l)+(fixed[k]!==undefined?' <small style="color:#2e7d32">['+esc(fixed[k])+']</small>':''); }
}
function onFixed(k,v){
  fixed[k]=v; autoSave();
  document.querySelectorAll('.pbox[data-k="'+k+'"]').forEach(function(box){ var txt=box.querySelector('.pbox-txt'); if(txt){ txt.textContent=v; txt.classList.toggle('empty',!v); txt.classList.add('fixed'); } });
}

// ── DELETE / RESTORE ──
function delField(k){
  if(!confirm('ลบช่องนี้?')) return;
  deleted[k]=1;
  order=order.filter(function(x){ return x!==k; });
  custom=custom.filter(function(f){ return f.k!==k; });
  delete layout[k]; delete values[k]; delete fixed[k];
  autoSave(); renderList(); renderBoxes(); renderFill(); updateStatus();
}

function restoreField(k){
  delete deleted[k];
  autoSave(); renderList(); renderFill(); updateStatus();
}

function renderTrash(){
  var Q="'";
  var el=document.getElementById('trash-section');
  if(!el) return;
  var gone=BF.filter(function(f){ return deleted[f.k]; });
  if(!gone.length){ el.innerHTML=''; return; }
  var html='<div style="margin-top:10px;padding:8px 10px;background:#fff8f8;border:1px solid #fcc;border-radius:8px">';
  html+='<div style="font-size:11px;font-weight:800;color:#c00;margin-bottom:6px">🗑️ ช่องที่ลบแล้ว (กดกู้คืน)</div>';
  gone.forEach(function(f){
    html+='<button onclick="restoreField('+Q+f.k+Q+')" style="display:block;width:100%;text-align:left;background:#fff;border:1px solid #fcc;border-radius:6px;padding:6px 10px;margin-bottom:4px;font-size:12px;cursor:pointer;color:#555;font-family:inherit">↩️ '+esc(f.l)+'</button>';
  });
  html+='</div>';
  el.innerHTML=html;
}

// ── CUSTOM FIELDS ──
function addCustomField(){
  var lbl=document.getElementById('new-label').value.trim();
  if(!lbl){ alert('กรุณาใส่ชื่อช่อง'); return; }
  var k='cx_'+Date.now();
  custom.push({k:k,l:lbl,custom:true});
  order.unshift(k);
  document.getElementById('new-label').value='';
  openKey=k; autoSave(); renderList();
}

// ── RENDER BOXES ──
function renderBoxes(){
  [1,2].forEach(function(p){ document.getElementById('pg'+p).querySelectorAll('.pbox').forEach(function(el){ el.remove(); }); });
  allFields().forEach(function(f){
    var pins=layout[f.k];
    if(!pins||!pins.length) return;
    var disp=getVal(f.k);
    pins.forEach(function(pin,i){
      var wrap=document.getElementById('pg'+pin.page);
      var img=document.getElementById('img'+pin.page);
      var iw=img.clientWidth, ih=img.clientHeight;
      if(!iw) return;
      var box=document.createElement('div');
      box.className='pbox'; box.dataset.k=f.k; box.dataset.i=i;
      box.style.left=(pin.xp*iw)+'px'; box.style.top=(pin.yp*ih)+'px'; box.style.transform='translateY(-50%)';
      var txt=document.createElement('span');
      txt.className='pbox-txt'+(disp?'':' empty')+(fixed[f.k]!==undefined?' fixed':'');
      txt.style.cssText='width:'+pin.w+'px;font-size:'+pin.fs+'px;font-family:'+pin.ff;
      txt.textContent=disp;
      box.appendChild(txt);
      if(mode==='setup'){
        var lbl=document.createElement('div'); lbl.className='pbox-lbl'; lbl.textContent=f.l+(pins.length>1?' #'+(i+1):''); box.appendChild(lbl);
        var del=document.createElement('button'); del.className='pbox-del'; del.textContent='×'; del.onclick=function(e){ e.stopPropagation(); removePin(f.k,i); }; box.appendChild(del);
        var res=document.createElement('div'); res.className='pbox-res'; box.appendChild(res);
        makeResizable(box,res,f.k,i); makeDraggable(box,f.k,i,img);
      }
      wrap.appendChild(box);
    });
  });
}

function makeDraggable(el,k,i,img){
  var sx,sy,ox,oy;
  el.addEventListener('mousedown',function(e){
    if(e.target.classList.contains('pbox-del')||e.target.classList.contains('pbox-res')) return;
    e.stopPropagation(); e.preventDefault();
    sx=e.clientX; sy=e.clientY; ox=parseFloat(el.style.left); oy=parseFloat(el.style.top);
    function mv(ev){ el.style.left=(ox+ev.clientX-sx)+'px'; el.style.top=(oy+ev.clientY-sy)+'px'; }
    function up(){ if(layout[k]&&layout[k][i]){ layout[k][i].xp=parseFloat(el.style.left)/img.clientWidth; layout[k][i].yp=parseFloat(el.style.top)/img.clientHeight; } autoSave(); document.removeEventListener('mousemove',mv); document.removeEventListener('mouseup',up); }
    document.addEventListener('mousemove',mv); document.addEventListener('mouseup',up);
  });
}
function makeResizable(box,handle,k,i){
  handle.addEventListener('mousedown',function(e){
    e.stopPropagation(); e.preventDefault();
    var sx=e.clientX, txt=box.querySelector('.pbox-txt'), sw=parseInt(txt.style.width)||120;
    function mv(ev){ var nw=Math.max(40,sw+ev.clientX-sx); txt.style.width=nw+'px'; if(layout[k]&&layout[k][i]) layout[k][i].w=nw; var el=document.getElementById('pw_'+k+'_'+i); if(el) el.textContent=nw; }
    function up(){ autoSave(); document.removeEventListener('mousemove',mv); document.removeEventListener('mouseup',up); }
    document.addEventListener('mousemove',mv); document.addEventListener('mouseup',up);
  });
}

// ── SAVE / RESET / PRINT ──
function saveAll2(){
  saveAll();
  alert('✅ บันทึก Layout เรียบร้อย!');
}
function resetAll(){
  if(!confirm('รีเซ็ต Layout ทั้งหมด?')) return;
  layout={}; autoSave(); renderBoxes(); renderList();
}
function doClear(){ if(!confirm('ล้างข้อมูลที่กรอก?')) return; values={}; lsSet(LS.values,values); renderFill(); renderBoxes(); }
function doPrint(){ setMode('fill'); setTimeout(function(){ window.print(); },300); }

</script>
