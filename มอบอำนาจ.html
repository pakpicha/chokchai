<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>หนังสือมอบอำนาจ (ท.ด.21) — โชคชัย เงินด่วน</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"TH Sarabun New","Sarabun",Arial,sans-serif;font-size:15px;background:#f0f0eb;color:#111}
.wrap{max-width:700px;margin:0 auto;padding:16px}
.card{background:#fff;border-radius:14px;padding:18px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.ct{font-size:13px;font-weight:700;color:#1a3a2a;background:#e8f5e8;border-radius:8px;padding:6px 12px;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.ct .n{background:#1a3a2a;color:#fff;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0}
.fg{margin-bottom:10px}
.fg label{display:block;font-size:12px;color:#555;margin-bottom:4px;font-weight:600}
.fg input,.fg select,.fg textarea{width:100%;padding:9px 11px;font-size:15px;border:1px solid #ccc;border-radius:8px;font-family:inherit;background:#fafaf7}
.fg textarea{min-height:60px;resize:vertical}
.fg .hint{font-size:11px;color:#999;margin-top:3px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.gen-btn{width:100%;padding:14px;background:#1a3a2a;color:#fff;border:none;border-radius:10px;font-size:16px;font-family:inherit;font-weight:700;cursor:pointer;margin-top:8px}
.back-btn{display:block;padding:12px;text-align:center;background:#eee;border-radius:8px;margin-bottom:12px;cursor:pointer;font-size:14px;border:none;font-family:inherit;width:100%}

@media print {
  .no-print{display:none!important}
  body{background:#fff;margin:0}
  @page{size:A4;margin:0}
  .doc-out{display:block!important}
  .doc-page{box-shadow:none!important;margin:0!important;width:21cm!important;height:29.7cm!important;min-height:0!important;overflow:hidden!important}
}
.doc-out{display:none}
.doc-page{font-family:"TH Sarabun New","Sarabun",Arial,sans-serif;color:#000;background:#fff;width:21cm;min-height:0;margin:0 auto;padding:0.3cm 1.3cm 0.25cm;font-size:13pt;line-height:1.22;position:relative}

.f-corner{position:absolute;top:0.7cm;left:1cm;font-size:14pt;font-weight:bold}
.f-tag{position:absolute;top:0.7cm;right:1.4cm;font-size:14pt}
.f-garuda{text-align:center;margin-bottom:0}
.f-garuda img{width:2.4cm;height:auto}
.f-h1{text-align:center;font-weight:bold;font-size:20pt;margin:-2pt 0 6pt}
.f-sub{font-weight:bold;font-size:14pt}
.dr{display:flex;align-items:flex-end;gap:6pt;line-height:1.5;white-space:nowrap}
.dr.wrap2{display:block;white-space:normal}
.dr>span:not(.dot):not(.f-idbox){flex-shrink:0}
.dot{border-bottom:1px dotted #000;flex:1 1 0;text-align:center;min-width:0;height:1.25em;display:inline-block;white-space:nowrap;overflow:hidden;padding:0 2px}
.dot.fix{flex:0 0 auto}
.f-idbox{display:inline-flex;gap:1px;vertical-align:middle;margin:0 2px}
.f-idbox span{display:inline-block;border:1px solid #000;width:15px;height:19px;text-align:center;line-height:19px;font-size:11pt}
.powerlines{margin:1pt 0}
.powerlines .pl{border-bottom:1px dotted #000;height:1.1em;display:block;margin-bottom:1pt}
.power-box{border:1px solid #000;padding:3pt 6pt;margin-top:1pt;min-height:1.4cm;font-size:12.5pt;line-height:1.45}
.power-box .pl{border-bottom:1px dotted #000;height:1.3em;display:block}
.sign-area{margin-top:3pt;position:relative;min-height:0}
.sign-grantor{text-align:center;width:9cm;margin-left:auto;margin-right:0.5cm}
.sign-line{display:inline-block;border-bottom:1px dotted #000;width:4.5cm;height:1.1em;vertical-align:bottom}
.witness-box{position:absolute;right:0.3cm;width:8.5cm}
/* boxes for signatures matching ท.ด.21 */
.sbox{border:1px solid #000;width:6.5cm;height:1.2cm;display:inline-block;vertical-align:middle;position:relative}
.sbox-cap{text-align:center;font-size:12.5pt;margin-top:1pt}
.sig-row{display:flex;align-items:center;gap:8pt;justify-content:flex-end;margin-top:2pt}
.witness-stack{display:flex;flex-direction:column;gap:2pt;align-items:flex-end;margin-top:2pt}
.witness-row{display:flex;align-items:center;gap:8pt}
.bottom-row{display:flex;align-items:flex-end;gap:10pt;margin-top:3pt}
.f-note{border:1px solid #000;padding:5pt 7pt;font-size:11.5pt;line-height:1.4;width:9.5cm;flex-shrink:0}
.f-warn{font-weight:bold;font-size:13pt;align-self:flex-end;margin-left:auto;white-space:nowrap}
</style>
</head>
<body>

<div class="wrap no-print">
  <button class="back-btn" onclick="location.href='index.html'">← หน้าหลัก</button>

  <div class="card">
    <div class="ct"><span class="n">1</span> ข้อมูลที่ดิน / หลักทรัพย์</div>
    <div class="row2">
      <div class="fg"><label>ระวาง</label><input id="rawang"></div>
      <div class="fg"><label>ตำบล (ที่ดิน)</label><input id="land_tambon"></div>
    </div>
    <div class="row3">
      <div class="fg"><label>เลขที่ดิน</label><input id="land_no"></div>
      <div class="fg"><label>หน้าสำรวจ</label><input id="survey_no"></div>
      <div class="fg"><label>อำเภอ (ที่ดิน)</label><input id="land_amphoe"></div>
    </div>
    <div class="row2">
      <div class="fg"><label>โฉนดหมายเลขที่</label><input id="title_no"></div>
      <div class="fg"><label>จังหวัด (ที่ดิน)</label><input id="land_province" value="นครราชสีมา"></div>
    </div>
    <div class="fg"><label>เรื่อง</label><input id="subject" placeholder="เช่น มอบอำนาจให้จดทะเบียนจำนอง"></div>
  </div>

  <div class="card">
    <div class="ct"><span class="n">2</span> วันที่ทำหนังสือ</div>
    <div class="row3">
      <div class="fg"><label>วันที่</label><input id="d_day" type="number" min="1" max="31" placeholder="วัน"></div>
      <div class="fg"><label>เดือน</label>
        <select id="d_month">
          <option value="">— เดือน —</option>
          <option>มกราคม</option><option>กุมภาพันธ์</option><option>มีนาคม</option>
          <option>เมษายน</option><option>พฤษภาคม</option><option>มิถุนายน</option>
          <option>กรกฎาคม</option><option>สิงหาคม</option><option>กันยายน</option>
          <option>ตุลาคม</option><option>พฤศจิกายน</option><option>ธันวาคม</option>
        </select>
      </div>
      <div class="fg"><label>พ.ศ.</label><input id="d_year" type="number" placeholder="เช่น 2569"></div>
    </div>
    <div class="fg hint">เว้นว่างได้ หากต้องการเขียนวันที่ด้วยมือภายหลัง</div>
  </div>

  <div class="card">
    <div class="ct"><span class="n">3</span> ผู้มอบอำนาจ (บริษัท)</div>
    <div class="fg"><label>กรรมการผู้ลงนามแทนบริษัท</label>
      <select id="grantor">
        <option value="">— เลือกกรรมการ —</option>
        <option>นายชุณนเกียรติ จรัสบวรพันธ์</option>
        <option>นางชญาน์นัทช์ จรัสบวรพันธ์</option>
        <option>นายกันตพัฒน์ จรัสบวรพันธ์</option>
        <option>นายฐานวัฒน์ จรัสบวรพันธ์</option>
        <option>นางสาวภัคฐ์พิชา จรัสบวรพันธ์</option>
      </select>
    </div>
    <div class="fg"><label>เลขประจำตัวผู้เสียภาษี (บริษัท)</label><input id="grantor_id" value="0305568001941"></div>
  </div>

  <div class="card">
    <div class="ct"><span class="n">4</span> ผู้รับมอบอำนาจ</div>
    <div class="fg"><label>เลือกผู้รับมอบ</label>
      <select id="grantee_sel" onchange="onGranteeSel()">
        <option value="">— เลือก —</option>
        <option>นายชุณนเกียรติ จรัสบวรพันธ์</option>
        <option>นางชญาน์นัทช์ จรัสบวรพันธ์</option>
        <option>นายกันตพัฒน์ จรัสบวรพันธ์</option>
        <option>นายฐานวัฒน์ จรัสบวรพันธ์</option>
        <option>นางสาวภัคฐ์พิชา จรัสบวรพันธ์</option>
        <option value="__other__">+ กรอกเอง (บุคคลอื่น)</option>
      </select>
    </div>
    <div class="fg"><label>ชื่อ-นามสกุล ผู้รับมอบ</label><input id="grantee_name" placeholder="ชื่อ-นามสกุล"></div>
    <div class="row2">
      <div class="fg"><label>เลขประจำตัวประชาชน (13 หลัก)</label><input id="grantee_id" maxlength="13"></div>
      <div class="fg"><label>อายุ (ปี)</label><input id="grantee_age" type="number"></div>
    </div>
    <div class="row2">
      <div class="fg"><label>เชื้อชาติ</label><input id="grantee_race" value="ไทย"></div>
      <div class="fg"><label>สัญชาติ</label><input id="grantee_nat" value="ไทย"></div>
    </div>
    <div class="fg"><label>บิดา-มารดา ชื่อ</label><input id="grantee_parent"></div>
    <div class="fg"><label>ที่อยู่ผู้รับมอบ</label><textarea id="grantee_addr"></textarea>
      <div class="hint">เลือกกรรมการแล้วที่อยู่เติมอัตโนมัติ แก้ไข/กรอกเองได้</div>
    </div>
    <div class="fg"><label>โทรศัพท์</label><input id="grantee_tel"></div>
  </div>

  <div class="card">
    <div class="ct"><span class="n">5</span> อำนาจที่มอบให้จัดการ</div>
    <div class="fg"><label>รายละเอียดอำนาจจัดการ</label>
      <textarea id="powers" style="min-height:120px" placeholder="ระบุให้ชัดเจนว่ามอบอำนาจให้ทำอะไร เช่น ให้มีอำนาจจดทะเบียนจำนอง ..."></textarea>
    </div>
  </div>

  <button class="gen-btn" onclick="genDoc()">🖨 สร้างหนังสือมอบอำนาจ</button>
</div>

<div class="doc-out" id="docOut">
  <div class="wrap no-print" style="padding-bottom:0">
    <div style="display:flex;gap:10px;padding:12px 0">
      <button onclick="backToForm()" style="flex:1;background:#fff;color:#1a3a2a;border:1px solid #1a3a2a;border-radius:8px;padding:11px;cursor:pointer;font-family:inherit;font-weight:700">← แก้ไข</button>
      <button onclick="window.print()" style="flex:2;background:#4caf50;color:#fff;border:none;border-radius:8px;padding:11px;cursor:pointer;font-family:inherit;font-weight:700">🖨 พิมพ์</button>
    </div>
  </div>
  <div id="doc-content" class="doc-page"></div>
</div>

function gv(id){var e=document.getElementById(id);return e?e.value.trim():'';}
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function dot(v,fl){var t=esc(v||'');return '<span class="dot" style="flex:'+(fl||1)+' 1 0;min-width:'+((fl||1)*0.6)+'cm">'+(t?t:'')+'</span>';}

function onGranteeSel(){
  var sel=gv('grantee_sel');
  var nameEl=document.getElementById('grantee_name');
  var addrEl=document.getElementById('grantee_addr');
  var telEl=document.getElementById('grantee_tel');
  if(sel==='__other__'){nameEl.value='';addrEl.value='';if(telEl)telEl.value='';nameEl.focus();return;}
  if(sel){
    nameEl.value=sel;
    if(DIR_ADDR[sel])addrEl.value=DIR_ADDR[sel];
    if(telEl&&DIR_TEL[sel])telEl.value=DIR_TEL[sel];
  }
}

function parseAddr(addr){
  var r={no:'',moo:'',tambon:'',amphoe:'',province:''};
  if(!addr)return r;
  var m;
  m=addr.match(/^([0-9\/]+)/); if(m)r.no=m[1];
  m=addr.match(/หมู่ที่\s*([0-9]+)/); if(m)r.moo=m[1];
  m=addr.match(/ต\.([^\s]+)/); if(m)r.tambon=m[1];
  m=addr.match(/อ\.([^\s]+)/); if(m)r.amphoe=m[1];
  m=addr.match(/จ\.([^\s]+)/); if(m)r.province=m[1];
  return r;
}

function idBoxes(id){
  id=(id||'').replace(/\D/g,'');
  var html='<span class="f-idbox">';
  for(var i=0;i<13;i++){html+='<span>'+(id[i]||'')+'</span>';}
  html+='</span>';
  return html;
}

  h+='<div class="dr"><span>เลขประจำตัวประชาชน</span>'+idBoxes(gv('grantee_id'))+'<span>อายุ</span>'+dot(gv('grantee_age'),1)+'<span>ปี เชื้อชาติ</span>'+dot(gv('grantee_race')||'ไทย',2)+'</div>';
  h+='<div class="dr"><span>สัญชาติ</span>'+dot(gv('grantee_nat')||'ไทย',3)+'<span>บิดาชื่อ</span>'+dot('',3)+'<span>มารดาชื่อ</span>'+dot('',3)+'</div>';
  h+='<div class="dr"><span>บ้านเลขที่</span>'+dot(ga.no,2)+'<span>หมู่ที่</span>'+dot(ga.moo,1)+'<span>ตรอก/ซอย</span>'+dot('',2)+'<span>ถนน</span>'+dot('',2)+'</div>';
  h+='<div class="dr"><span>ตำบล/แขวง</span>'+dot(ga.tambon,3)+'<span>อำเภอ/เขต</span>'+dot(ga.amphoe,3)+'<span>จังหวัด</span>'+dot(ga.province,4)+'<span>โทร.</span>'+dot(gv('grantee_tel'),5)+'</div>';

  // อำนาจ - 6 บรรทัดเส้นจุดไข่ปลา ไม่มีกรอบ บรรทัดสุดท้ายมี "แทนข้าพเจ้าจนเสร็จการ" ต่อท้าย
  h+='<div class="f-sub" style="margin-top:3pt">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;เป็นผู้มีอำนาจจัดการ</div>';
  var pw=esc(powers).replace(/\n/g,'<br>');
  h+='<div style="margin-top:2pt">';
  if(pw){
    h+='<div class="dr wrap2" style="text-indent:1.5cm;border-bottom:1px dotted #000;padding-bottom:1pt;line-height:1.4">'+pw+'</div>';
    h+='<div class="powerlines"><div class="pl"></div><div class="pl"></div><div class="pl"></div><div class="pl"></div></div>';
  }else{
    h+='<div class="powerlines"><div class="pl"></div><div class="pl"></div><div class="pl"></div><div class="pl"></div><div class="pl"></div></div>';
  }
  // บรรทัดที่ 6 — เส้นจุด + "แทนข้าพเจ้าจนเสร็จการ" ต่อท้าย
  h+='<div style="display:flex;align-items:flex-end;gap:6pt"><span style="flex:1 1 0;border-bottom:1px dotted #000;height:1.1em"></span><span style="white-space:nowrap">แทนข้าพเจ้าจนเสร็จการ</span></div>';
  h+='</div>';
  h+='<div class="dr wrap2" style="text-indent:1.5cm">เพื่อเป็นหลักฐานข้าพเจ้าได้ ลงลายมือชื่อ/ลายพิมพ์นิ้วมือ ไว้เป็นสำคัญต่อหน้าพยานแล้ว</div>';

  // ลายเซ็นผู้มอบ — เส้นจุดในวงเล็บ ไม่ใช่กล่อง
  h+='<div style="text-align:right;margin-top:3pt;padding-right:1.2cm">';
  h+='  <div>ลงชื่อ <span style="display:inline-block;border-bottom:1px dotted #000;width:6cm;height:1.1em;vertical-align:bottom"></span> ผู้มอบอำนาจ</div>';
  h+='  <div style="margin-top:-2pt;padding-right:1.9cm;white-space:nowrap"><span style="display:inline-block;width:6cm;text-align:center;white-space:nowrap">( บริษัท โชคชัย เงินด่วน จำกัด )</span></div>';
  h+='</div>';

  // ข้อความรับรอง
  h+='<div class="dr wrap2" style="text-indent:1.5cm;margin-top:2pt">ข้าพเจ้าขอรับรองว่าเป็น ลายมือชื่อ / ลายพิมพ์นิ้วมือ อันแท้จริงของผู้มอบอำนาจและผู้มอบอำนาจได้ลงลายมือชื่อ/พิมพ์ลายนิ้วมือ ต่อหน้าข้าพเจ้า</div>';

  // แถวเดียว: หมายเหตุ (ซ้าย) + พยาน 2 บรรทัด (ขวา)
  h+='<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-top:3pt;gap:10pt">';
  h+='  <div style="border:1px solid #000;padding:3pt 6pt;font-size:10.5pt;line-height:1.3;width:8cm;flex-shrink:0">';
  h+='    <b>หมายเหตุ</b> กรณีที่ผู้รับมอบอำนาจเป็นนิติบุคคลให้แนบเอกสารหลักฐานสำคัญของนิติบุคคลนั้น เช่น "หนังสือรับรองการจดทะเบียนนิติบุคคลและบัญชีรายชื่อผู้ถือหุ้นล่าสุด" หรือเป็นไปตามที่กฎหมายระบุไว้';
  h+='  </div>';
  h+='  <div style="text-align:right;padding-right:1cm">';
  h+='    <div>ลงชื่อ <span style="display:inline-block;border-bottom:1px dotted #000;width:6cm;height:1.1em;vertical-align:bottom"></span> พยาน</div>';
  h+='    <div style="margin-top:-2pt;padding-right:1cm"><span style="display:inline-block;width:6cm;text-align:center">( <span style="display:inline-block;border-bottom:1px dotted #000;width:4cm"></span> )</span></div>';
  h+='    <div style="margin-top:3pt">ลงชื่อ <span style="display:inline-block;border-bottom:1px dotted #000;width:6cm;height:1.1em;vertical-align:bottom"></span> พยาน</div>';
  h+='    <div style="margin-top:-2pt;padding-right:1cm"><span style="display:inline-block;width:6cm;text-align:center">( <span style="display:inline-block;border-bottom:1px dotted #000;width:4cm"></span> )</span></div>';
  h+='  </div>';
  h+='</div>';

  // หมายเหตุล่าง + คำเตือน
  h+='<div style="margin-top:4pt;display:flex;justify-content:space-between;align-items:flex-end;font-size:11pt">';
  h+='  <div style="max-width:13cm"><b>หมายเหตุ</b> การลงลายมือชื่อหรือพิมพ์ลายนิ้วมือ ถ้าใช้อย่างใดให้ขีดฆ่าข้อความที่ไม่ใช้ออก ในกรณีพิมพ์ลายนิ้วมือให้ใช้พิมพ์ลายนิ้วมือแม่มือซ้าย</div>';
  h+='  <div style="font-weight:bold;white-space:nowrap">โปรดอ่านคำเตือนด้านหลัง</div>';
  h+='</div>';

  document.getElementById('doc-content').innerHTML=h;
  document.querySelector('.wrap.no-print').style.display='none';
  document.getElementById('docOut').style.display='block';
  window.scrollTo(0,0);
}

function backToForm(){
  document.getElementById('docOut').style.display='none';
  document.querySelector('.wrap.no-print').style.display='block';
  window.scrollTo(0,0);
}
</script>
