<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>โนติสทนายความ — โชคชัย เงินด่วน</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"TH Sarabun New","Sarabun",Arial,sans-serif;font-size:15px;background:#f0f0eb;color:#111}
.wrap{max-width:720px;margin:0 auto;padding:16px}
.card{background:#fff;border-radius:14px;padding:18px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.ct{font-size:13px;font-weight:700;color:#1a3a2a;background:#e8f5e8;border-radius:8px;padding:6px 12px;margin-bottom:12px}
.fg{margin-bottom:10px}
.fg label{display:block;font-size:12px;color:#555;margin-bottom:3px;font-weight:600}
.fg input,.fg select,.fg textarea{width:100%;padding:9px 11px;font-size:14px;border:1px solid #ccc;border-radius:8px;font-family:inherit;background:#fafaf7}
.fg textarea{min-height:60px;resize:vertical}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.att-row{display:flex;gap:8px;align-items:center;margin-bottom:6px}
.att-row input{flex:1;padding:8px;font-size:14px;border:1px solid #ccc;border-radius:6px;font-family:inherit}
.att-row button{background:#fee;border:1px solid #fcc;border-radius:6px;color:#c00;padding:6px 10px;cursor:pointer;font-size:13px}
.add-btn{width:100%;padding:10px;background:#e8f5e8;border:2px dashed #4caf50;border-radius:8px;font-size:13px;font-family:inherit;color:#1a3a2a;font-weight:700;cursor:pointer;margin-top:4px}
.gen-btn{width:100%;padding:13px;background:#1a3a2a;color:#fff;border:none;border-radius:10px;font-size:15px;font-family:inherit;font-weight:700;cursor:pointer;margin-top:6px}
.btn-red{background:#c0392b}
.btn-green{background:#1a3a2a}
.btn-blue{background:#2980b9}
.back-btn{display:block;padding:11px;text-align:center;background:#eee;border-radius:8px;margin-bottom:12px;cursor:pointer;font-size:14px;border:none;font-family:inherit;width:100%}

/* ── PRINT: เอกสาร A4 ── */
@media print{
  .no-print{display:none!important}
  body{background:#fff}
  @page{size:A4 portrait;margin:0.6cm 0.9cm}
  .doc-page{display:block!important}
}
.doc-page{display:none;font-family:"TH Sarabun New","Sarabun",Arial,sans-serif;font-size:14pt;line-height:1.8;color:#000}

/* header บริษัทตราด้านซ้าย */
.law-header{display:flex;align-items:center;gap:10px;margin-bottom:2pt;padding-bottom:2pt;border-bottom:1pt solid #000}
.law-logo{width:55pt;height:55pt;object-fit:contain;flex-shrink:0}
.law-info{flex:1;line-height:1.3;font-size:13pt}
.law-info .firm{font-size:15pt;font-weight:bold}
.law-date{text-align:right;margin:1pt 0 0;font-size:14pt}
.law-subject table{width:100%;border-collapse:collapse;margin-bottom:4pt}
.law-subject td{vertical-align:top;padding:0;font-size:14pt;line-height:1.4}
.law-subject td:first-child{width:7em;font-weight:bold}
.law-ref{margin-bottom:8pt}
.law-ref .ref-title{font-weight:bold;font-size:14pt}
.law-ref ol{margin-left:1.5em;font-size:14pt;margin-top:0;margin-bottom:0}
.law-body p{text-indent:1.5cm;text-align:justify;margin-bottom:1pt;font-size:14pt;line-height:1.4}
.law-sign{text-align:center;margin-top:0.3cm}
.law-sign p{font-size:14pt;line-height:1.35}
.law-sign .sign-name{border-top:none}



/* ── Thai Date Picker ── */
.tdp-wrap{position:relative;display:inline-block;width:100%}
.tdp-input{width:100%;padding:9px 36px 9px 11px;font-size:15px;border:1px solid #ccc;
  border-radius:8px;font-family:inherit;background:#fafaf7;box-sizing:border-box;cursor:text}
.tdp-input.ok{border-color:#4caf50;background:#f7fcf7}
.tdp-input.er{border-color:#e74c3c;background:#fff5f5}
.tdp-icon{position:absolute;right:10px;top:50%;transform:translateY(-50%);
  font-size:16px;cursor:pointer;color:#888;user-select:none}
.tdp-drop{display:none;position:absolute;top:calc(100% + 4px);left:0;z-index:9999;
  background:#fff;border:1px solid #ddd;border-radius:12px;padding:10px;
  box-shadow:0 4px 16px rgba(0,0,0,.15);min-width:260px}
.tdp-drop.open{display:block}
.tdp-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.tdp-nav button{background:none;border:none;cursor:pointer;font-size:18px;color:#1a3a2a;
  padding:4px 8px;border-radius:6px;font-family:inherit}
.tdp-nav button:hover{background:#e8f5e8}
.tdp-nav .tdp-my{font-size:15px;font-weight:700;color:#1a3a2a;cursor:pointer;
  padding:4px 8px;border-radius:6px}
.tdp-nav .tdp-my:hover{background:#e8f5e8}
.tdp-days-hdr{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px}
.tdp-days-hdr span{text-align:center;font-size:11px;color:#888;font-weight:700;padding:2px 0}
.tdp-days{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.tdp-day{text-align:center;padding:6px 2px;font-size:13px;border-radius:6px;cursor:pointer;
  border:none;background:none;font-family:inherit;color:#333;width:100%}
.tdp-day:hover{background:#e8f5e8;color:#1a3a2a}
.tdp-day.today{font-weight:700;color:#1a3a2a}
.tdp-day.sel{background:#1a3a2a!important;color:#fff!important}
.tdp-day.empty{cursor:default;pointer-events:none}
.tdp-ym{display:none;padding:4px}
.tdp-ym.open{display:block}
.tdp-ym select{width:100%;padding:8px;font-size:15px;border:1px solid #ccc;
  border-radius:8px;font-family:inherit;background:#fafaf7;margin-bottom:6px}
.tdp-shortcut{display:flex;gap:6px;margin-top:8px;padding-top:8px;border-top:1px solid #eee}
.tdp-shortcut input{flex:1;padding:7px 10px;font-size:13px;border:1px solid #ddd;
  border-radius:6px;font-family:inherit;background:#fffde7;text-align:center}
.tdp-shortcut span{font-size:11px;color:#999;display:flex;align-items:center;white-space:nowrap}
</style>
</head>
<body>

<!-- FORM -->
<div class="wrap no-print" id="form-wrap">
  <button class="back-btn" onclick="location.href='index.html'">← หน้าหลัก</button>

  <!-- ข้อมูลทนาย -->
  <div class="card">
    <div class="ct">⚖️ สำนักงานทนายความ</div>
    <div class="fg"><label>ชื่อสำนักงานทนายความ</label>
      <input id="law_firm" value="สำนักงานทนายความพัตชรัตน์ สุวรรณนิธิภัทร์"></div>
    <div class="fg"><label>ที่อยู่สำนักงาน</label>
      <input id="law_addr" value="เลขที่ 243 ถ.ประดิษฐ์ปานะ อ.นางรอง จ.บุรีรัมย์"></div>
    <div class="fg"><label>โทรศัพท์</label>
      <input id="law_tel" value="093-2391651"></div>
    <div class="fg"><label>ชื่อทนายความ (ผู้ลงนาม)</label>
      <input id="law_sign" value="นางสาวพัตชรัตน์ สุวรรณนิธิภัทร์"></div>
  </div>

  <!-- ประเภทโนติส -->
  <div class="card">
    <div class="ct">📋 ประเภทหนังสือ</div>
    <div class="fg"><label>ประเภท</label>
      <select id="notice_type" onchange="onTypeChange(this.value)">
        <option value="mortgage">แจ้งให้ชำระหนี้และบอกกล่าวบังคับจำนอง</option>
        <option value="loan">ให้ชำระหนี้ตามสัญญาเงินกู้</option>
        <option value="sellback">ให้ชำระหนี้ตามสัญญาขายฝาก</option>
      </select></div>
    <div class="fg"><label>วันที่หนังสือ</label>
      <div class="tdp-wrap" id="tdpw_notice_date" onclick="event.stopPropagation()"><input type="hidden" id="notice_date"><input type="text" id="tdpi_notice_date" class="tdp-input" placeholder="เลือกหรือพิมพ์วว/ดด/ปปปป" onfocus="tdpFocus('notice_date')" onkeydown="tdpKeydown('notice_date',event)" autocomplete="off"><span class="tdp-icon" onclick="tdpOpen('notice_date')">📅</span><div class="tdp-drop" id="tdpd_notice_date"><div class="tdp-nav"><button onclick="tdpNav('notice_date',-1,event)">‹</button><span class="tdp-my" onclick="tdpToggleYM('notice_date');event.stopPropagation()">...</span><button onclick="tdpNav('notice_date',1,event)">›</button></div><div class="tdp-ym"></div><div class="tdp-days-hdr"><span>อา</span><span>จ</span><span>อ</span><span>พ</span><span>พฤ</span><span>ศ</span><span>ส</span></div><div class="tdp-days"></div></div></div><script>setTimeout(function(){tdpInit("notice_date","");},50);</script></div>
    <div class="fg"><label>กำหนดเวลา (วัน)</label>
      <input id="notice_days" value="60"></div>
  </div>

  <!-- ผู้รับ -->
  <div class="card">
    <div class="ct">👤 ผู้รับหนังสือ (ลูกหนี้/ผู้จำนอง)</div>
    <div style="font-size:12px;color:#666;margin-bottom:8px">ชื่อทุกคนจะถูกรวมใส่ "เรียน" ในหนังสือ ที่อยู่ใช้จ่าซองแต่ละซอง</div>
    <div id="debtors-wrap"></div>
    <button class="add-btn" onclick="addDebtor()">+ เพิ่มผู้กู้/ผู้จำนอง</button>
  </div>

  <!-- ข้อมูลบริษัทผู้ให้กู้ -->
  <div class="card">
    <div class="ct">🏢 บริษัทผู้ให้กู้</div>
    <div class="fg"><label>ชื่อบริษัท</label>
      <input id="co_name" value="บริษัท โชคชัย เงินด่วน จำกัด"></div>
  </div>

  <!-- สัญญาอ้างถึง -->
  <div class="card">
    <div class="ct">📎 สัญญาที่อ้างถึง</div>
    <div style="font-size:12px;color:#666;margin-bottom:8px">วันที่ดึงจาก "วันที่ทำสัญญา" ด้านล่างอัตโนมัติ</div>
    <div id="refs-wrap"></div>
    <button class="add-btn" onclick="addRef()">+ เพิ่มสัญญาอ้างถึง</button>
  </div>

  <!-- รายละเอียดหนี้ -->
  <div class="card">
    <div class="ct">💰 รายละเอียดหนี้</div>
    <div class="fg"><label>จำนวนเงิน (บาท)</label>
      <input id="debt_amt" inputmode="numeric" placeholder="เช่น 1000000" oninput="onDebtChange()"></div>
    <div class="fg"><label>จำนวนเงิน (ตัวอักษร)</label>
      <input id="debt_amt_t" readonly></div>
    <div class="fg"><label>อัตราดอกเบี้ย (%/ปี)</label>
      <input id="debt_rate" value="15"></div>
    <div class="fg"><label>วันที่ทำสัญญา (ครั้งแรก)</label>
      <div class="tdp-wrap" id="tdpw_debt_date1" onclick="event.stopPropagation()"><input type="hidden" id="debt_date1"><input type="text" id="tdpi_debt_date1" class="tdp-input" placeholder="เลือกหรือพิมพ์วว/ดด/ปปปป" onfocus="tdpFocus('debt_date1')" onkeydown="tdpKeydown('debt_date1',event)" autocomplete="off"><span class="tdp-icon" onclick="tdpOpen('debt_date1')">📅</span><div class="tdp-drop" id="tdpd_debt_date1"><div class="tdp-nav"><button onclick="tdpNav('debt_date1',-1,event)">‹</button><span class="tdp-my" onclick="tdpToggleYM('debt_date1');event.stopPropagation()">...</span><button onclick="tdpNav('debt_date1',1,event)">›</button></div><div class="tdp-ym"></div><div class="tdp-days-hdr"><span>อา</span><span>จ</span><span>อ</span><span>พ</span><span>พฤ</span><span>ศ</span><span>ส</span></div><div class="tdp-days"></div></div></div><script>setTimeout(function(){tdpInit("debt_date1","");},50);</script></div>
    <!-- เพิ่มยอดกู้ครั้งต่อมา -->
    <div id="extra-loans-wrap"></div>
    <button class="add-btn" onclick="addExtraLoan()">+ เพิ่มยอดกู้ครั้งต่อมา</button>
  </div>

  <!-- ที่ดินค้ำประกัน (ถ้ามี) -->
  <div class="card" id="land-card">
    <div class="ct">🏠 ที่ดินค้ำประกัน</div>
    <div class="fg"><label>ประเภทเอกสาร</label>
      <select id="land_doc_type">
        <option value="โฉนดที่ดิน">โฉนดที่ดิน</option>
        <option value="น.ส.3 ก.">น.ส.3 ก.</option>
        <option value="น.ส.3">น.ส.3</option>
      </select></div>
    <div class="fg"><label>เลขที่โฉนด (คั่น , ถ้าหลายแปลง)</label>
      <input id="land_chanote" placeholder="เช่น 315883, 315884"></div>
    <div class="fg"><label>เลขที่ดิน (คั่น ,)</label>
      <input id="land_no" placeholder="เช่น 1452, 1453"></div>
    <div class="row2">
      <div class="fg"><label>ตำบล</label><input id="land_tambon" placeholder="ตำบล"></div>
      <div class="fg"><label>อำเภอ</label><input id="land_amphoe" placeholder="อำเภอ"></div>
    </div>
    <div class="fg"><label>จังหวัด</label><input id="land_province" value="นครราชสีมา"></div>
    <div class="fg"><label>พร้อมสิ่งปลูกสร้าง</label>
      <select id="land_building">
        <option value="yes">มีสิ่งปลูกสร้าง</option>
        <option value="no">ไม่มีสิ่งปลูกสร้าง</option>
      </select></div>
  </div>

  <button class="gen-btn btn-green" onclick="genNotice()">📄 สร้างหนังสือโนติส</button>
  <button class="gen-btn btn-blue" onclick="openAllDocs()" style="margin-top:6px">🚀 เปิดซอง + ใบตอบรับ (ทุกคนอัตโนมัติ)</button>
</div>

<!-- DOC PREVIEW -->
<div id="doc-wrap" style="display:none">
  <div class="no-print" style="background:#1a3a2a;color:#fff;padding:12px 16px;display:flex;gap:10px;align-items:center">
    <button onclick="backToForm()" style="background:#fff;color:#1a3a2a;border:none;border-radius:6px;padding:8px 16px;cursor:pointer;font-family:inherit;font-weight:700">← แก้ไข</button>
    <button onclick="window.print()" style="background:#4caf50;color:#fff;border:none;border-radius:6px;padding:8px 16px;cursor:pointer;font-family:inherit;font-weight:700">🖨 พิมพ์</button>
    <span style="font-size:14px">หนังสือโนติส</span>
  </div>
  <div id="doc-content" style="background:#fff;padding:1.5cm 1.8cm;min-height:29.7cm;max-width:21cm;margin:0 auto"></div>
</div>

<script>
var refC=0,loanC=0,debtorC=0;
function addDebtor(data){
  debtorC++;var n=debtorC;var d=data||{};
  var wrap=document.getElementById('debtors-wrap');
  var div=document.createElement('div');
  div.id='debtor-'+n;
  div.style.cssText='border:1.5px solid #c8e0c8;border-radius:10px;padding:12px;margin-bottom:10px;background:#f7fcf7';
  div.innerHTML=
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">'+
    '<b style="font-size:13px;color:#1a3a2a">ผู้กู้/ผู้จำนอง '+(n===1?'1 (หลัก)':n)+'</b>'+
    (n>1?'<button type="button" onclick="removeDebtor('+n+')" style="background:#fee;border:1px solid #fcc;border-radius:5px;color:#c00;padding:3px 10px;cursor:pointer;font-size:12px">ลบ</button>':'')+
    '</div>'+
    '<div class="fg"><label>ชื่อ-นามสกุล</label>'+
    '<input type="text" id="db_name_'+n+'" value="'+(d.name||'')+'" placeholder="เช่น นายสมชาย ใจดี"></div>'+
    '<div class="fg"><label>ที่อยู่ (สำหรับซอง)</label>'+
    '<textarea id="db_addr_'+n+'" rows="2" style="width:100%;padding:8px;font-size:14px;border:1px solid #ccc;border-radius:6px;font-family:inherit">'+(d.addr||'')+'</textarea></div>'+
    '<div class="row2">'+
    '<div class="fg"><label>รหัสไปรษณีย์</label>'+
    '<input type="text" id="db_zip_'+n+'" value="'+(d.zip||'')+'" maxlength="5" inputmode="numeric" style="width:100%;padding:8px;font-size:14px;border:1px solid #ccc;border-radius:6px;font-family:inherit"></div>'+
    '<div class="fg"><label>เบอร์โทร</label>'+
    '<input type="text" id="db_tel_'+n+'" value="'+(d.tel||'')+'" inputmode="tel"></div>'+
    '</div>';
  wrap.appendChild(div);
}
function removeDebtor(n){var el=document.getElementById('debtor-'+n);if(el)el.remove();}
function getDebtors(){
  var list=[];
  document.getElementById('debtors-wrap').querySelectorAll('[id^="debtor-"]').forEach(function(div){
    var n=div.id.replace('debtor-','');
    list.push({name:(document.getElementById('db_name_'+n)||{value:''}).value.trim(),
               addr:(document.getElementById('db_addr_'+n)||{value:''}).value.trim(),
               zip:(document.getElementById('db_zip_'+n)||{value:''}).value.trim(),
               tel:(document.getElementById('db_tel_'+n)||{value:''}).value.trim()});
  });
  return list;
}

var THMONTHS=['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];

function gv(id){var e=document.getElementById(id);return e?e.value.trim():'';}

function thDate(s){
  if(!s)return '......';
  var p=s.split('-');if(p.length!==3)return s;
  return parseInt(p[2])+' '+THMONTHS[parseInt(p[1])-1]+' '+(parseInt(p[0])+543);
}

function fmtNum(s){var n=parseFloat(String(s).replace(/,/g,''));return isNaN(n)?s:n.toLocaleString('th-TH');}

function toBaht(n){
  n=parseInt(String(n).replace(/[,\s]/g,''));
  if(isNaN(n)||n===0)return '';
  var u=['','หนึ่ง','สอง','สาม','สี่','ห้า','หก','เจ็ด','แปด','เก้า'];
  var p=['','สิบ','ร้อย','พัน','หมื่น','แสน','ล้าน'];
  function t(n){
    if(n===0)return'';
    if(n>=1000000)return t(Math.floor(n/1000000))+'ล้าน'+t(n%1000000);
    var r='',d=String(n).split('');d.reverse();
    for(var i=0;i<d.length;i++){
      if(d[i]==='0')continue;
      r=u[parseInt(d[i])]+p[i]+r;
      if(i===1&&d[i]==='1')r='สิบ'+r.slice(2);
      if(i===1&&d[i]==='2')r='ยี่สิบ'+r.slice(4);
    }
    return r;
  }
  return t(n)+'บาทถ้วน';
}

function onDebtChange(){
  var amt=gv('debt_amt').replace(/,/g,'');
  var el=document.getElementById('debt_amt_t');
  if(el)el.value=amt?toBaht(parseInt(amt)):'';
}

var DEFAULT_REFS={
  mortgage:'สัญญาจำนองที่ดิน',
  loan:'สัญญากู้ยืมเงิน',
  sellback:'สัญญาขายฝากที่ดิน'
};
function onTypeChange(v){
  // sync ref dropdowns ทุกอัน
  var DR=DEFAULT_REFS;
  document.querySelectorAll('[id^="ref_val_"]').forEach(function(el){
    var cur=el.value.trim();
    var isDefault=!cur||Object.values(DR).indexOf(cur)!==-1;
    if(isDefault) el.value=DR[v]||DR.mortgage;
  });
  var lc=document.getElementById('land-card');
  lc.style.display='block';
  var refDivs=document.querySelectorAll('[id^="ref-"]');
  if(refDivs.length===1){
    var n=refDivs[0].id.replace('ref-','');
    var el=document.getElementById('ref_val_'+n);
    var cur=el?el.value.trim():'';
    var isDefault=Object.values(DEFAULT_REFS).indexOf(cur)!==-1||cur==='';
    if(el&&isDefault) el.value=DEFAULT_REFS[v]||DEFAULT_REFS.mortgage;
  }
}

function addRef(val,date){
  refC++;
  var n=refC;
  var wrap=document.getElementById('refs-wrap');
  var div=document.createElement('div');
  div.id='ref-'+n;
  div.className='att-row';
  var contractDate=(document.getElementById('debt_date1')||{value:''}).value;
  var useDate=date||contractDate||'';
  div.innerHTML=

function onLoanAmt(n){
  var amt=gv('loan_amt_'+n).replace(/,/g,'');
  var el=document.getElementById('loan_amt_t_'+n);
  if(el)el.value=amt?toBaht(parseInt(amt)):'';
}

function getRefs(){
  var list=[];
  document.querySelectorAll('[id^="ref-"]').forEach(function(div){
    var n=div.id.replace('ref-','');
    var v=gv('ref_val_'+n); var d=(document.getElementById('ref_date_'+n)||{value:''}).value;
    if(v)list.push({text:v,date:thDate(d)});
  });
  return list;
}

function getLoans(){
  var list=[];
  document.querySelectorAll('[id^="loan-"]').forEach(function(div){
    var n=div.id.replace('loan-','');
    var amt=gv('loan_amt_'+n); var amtT=gv('loan_amt_t_'+n); var d=(document.getElementById('loan_date_'+n)||{value:''}).value;
    if(amt)list.push({amt:fmtNum(amt),amtT:amtT,date:thDate(d)});
  });
  return list;
}

// ── BUILD DOCUMENT HTML ──
function buildDoc(){
  var type=gv('notice_type');
  var firm=gv('law_firm');
  var addr=gv('law_addr');
  var tel=gv('law_tel');
  var signer=gv('law_sign');
  var noticeDate=thDate((document.getElementById('notice_date')||{value:''}).value);
  var days=gv('notice_days')||'60';
  var debtors=getDebtors();
  var toName=debtors.map(function(d){return d.name;}).filter(Boolean).join(', ')||'...............';
  var coName=gv('co_name');
  var debtAmt=fmtNum(gv('debt_amt'));
  var debtAmtT=gv('debt_amt_t');
  var debtRate=gv('debt_rate')||'15';
  var debtDate1=thDate((document.getElementById('debt_date1')||{value:''}).value);
  var refs=getRefs();
  var loans=getLoans();
  var landDocType=gv('land_doc_type');
  var landChanote=gv('land_chanote');
  var landNo=gv('land_no');
  var landTambon=gv('land_tambon');
  var landAmphoe=gv('land_amphoe');
  var landProvince=gv('land_province');
  var hasBuilding=gv('land_building')==='yes';

  // subject text ตามประเภท
  var subjects={
    mortgage:'ให้ชำระหนี้และบอกกล่าวบังคับจำนอง',
    loan:'ให้ชำระหนี้ตามสัญญากู้เงิน',
    sellback:'ให้ชำระหนี้และแจ้งสิทธิไถ่คืนตามสัญญาขายฝาก'
  };
  var subject=subjects[type]||subjects.mortgage;

  // refs HTML
  var refsHTML='';
  if(refs.length>0){
    refsHTML='<div class="law-ref"><span class="ref-title">อ้างถึง</span><ol>';
    refs.forEach(function(r){
      refsHTML+='<li>'+r.text+(r.date&&r.date!=='......'?' ฉบับลงวันที่ '+r.date:'')+'</li>';
    });
    refsHTML+='</ol></div>';
  }

  // loans text
  var loansText='';
  loans.forEach(function(l){
    loansText+='และต่อมาเมื่อวันที่ '+l.date+' ท่านได้กู้ยืมเงินเพิ่มเติมอีกจำนวน '+l.amt+' บาท ('+l.amtT+') ';
  });

  // ยอดรวม
  var totalAmt=parseInt((gv('debt_amt')||'0').replace(/,/g,''))||0;
  loans.forEach(function(l){
    totalAmt+=parseInt((l.amt||'0').replace(/,/g,'').replace(/[^0-9]/g,''))||0;
  });
  var totalAmtFmt=totalAmt?totalAmt.toLocaleString('th-TH'):'';
  var totalAmtT=totalAmt?toBaht(totalAmt):'';
  var showTotal=loans.length>0&&totalAmt>0;

  // ที่ดิน
  var landText='';
  var landRef='';
  if(landChanote||landNo||landTambon){
    landRef=landDocType+' เลขที่ '+landChanote+(landNo?' เลขที่ดิน '+landNo:'')+' ตำบล '+landTambon+' อำเภอ '+landAmphoe+' จังหวัด '+landProvince;
    landText=landRef+(hasBuilding?' พร้อมสิ่งปลูกสร้าง ซึ่งเป็นกรรมสิทธิ์ของท่าน':' ซึ่งเป็นกรรมสิทธิ์ของท่าน');
  }

  // ── เนื้อความตามประเภท ──
  var bodyP1='', bodyP2='', bodyP3='', bodyP4='', bodyP5='';

  if(type==='mortgage'){

      +(landText?' โดยได้นำ'+landText+'จดทะเบียนจำนองไว้ต่อหน้าพนักงานเจ้าหน้าที่เป็นประกันหนี้ดังกล่าว':'')
      +(loansText?' '+loansText:'')
      +(showTotal?' รวมยอดหนี้ทั้งสิ้น '+totalAmtFmt+' บาท ('+totalAmtT+')':'')

    bodyP2='บัดนี้ปรากฏว่าท่านผิดนัดไม่ชำระดอกเบี้ยและ/หรือเงินต้นตามสัญญาดังกล่าว แม้ '+coName+' จะได้ทวงถามแล้วก็ตาม ท่านก็ยังคงเพิกเฉยไม่ชำระหนี้แต่อย่างใด ถือว่าท่านเป็นฝ่ายผิดสัญญาและผิดนัดชำระหนี้';

  } else if(type==='loan'){
    // ย่อหน้า 1: ข้อเท็จจริงสัญญา

      +' อัตราดอกเบี้ยร้อยละ '+debtRate+' ต่อปี ตามสัญญากู้เงิน ฉบับลงวันที่ '+debtDate1
      +(landText?' โดยท่านได้นำ'+landText+'มาเป็นหลักประกัน':'')
      +(loansText?' '+loansText:'')
      +(showTotal?' รวมยอดหนี้ทั้งสิ้น '+totalAmtFmt+' บาท ('+totalAmtT+')':'')
      +' อันเป็นรายละเอียดที่ท่านทราบดีอยู่แล้วนั้น';
    // ย่อหน้า 2: การผิดนัด
    bodyP2='บัดนี้ปรากฏว่าท่านผิดนัดไม่ชำระดอกเบี้ยและ/หรือเงินต้นตามสัญญาดังกล่าว แม้ผู้ให้กู้จะได้ทวงถามแล้วก็ตาม ท่านก็ยังคงเพิกเฉยไม่ชำระหนี้ จึงถือว่าหนี้ทั้งหมดถึงกำหนดชำระทันที';

  return '<div class="doc-page" style="display:block">'

function genNotice(){
  saveForm();
  var html=buildDoc();
  document.getElementById('doc-content').innerHTML=html;
  document.getElementById('form-wrap').style.display='none';
  document.getElementById('doc-wrap').style.display='block';
}

function backToForm(){
  document.getElementById('doc-wrap').style.display='none';
  document.getElementById('form-wrap').style.display='block';
}

function openAllDocs(){
  saveRecipients();
  window.open('ซองจดหมาย.html','_blank');
  window.open('ใบตอบรับ.html','_blank');
}

function saveRecipients(){
  try{
    var debtors=getDebtors();
    var rcps=debtors.filter(function(d){return d.name||d.addr;}).map(function(d){return{name:d.name,addr:d.addr,zip:d.zip,tel:d.tel};});
    sessionStorage.setItem('env_recipients',JSON.stringify(rcps));
    localStorage.setItem('env_recipients_shared',JSON.stringify(rcps));

    // sync date display fields
    document.querySelectorAll('input[type="hidden"][id]').forEach(function(d){
      if(d.value&&document.getElementById('tdpi_'+d.id)) tdpSetValue(d.id,d.value);
    });
  }catch(e){}
}

// auto-save
var LS='notice_lawyer';
var FKEYS=['law_firm','law_addr','law_tel','law_sign','notice_type','notice_days',
  'co_name','debt_amt','debt_amt_t','debt_rate',
  'land_doc_type','land_chanote','land_no','land_tambon','land_amphoe','land_province','land_building'];
function saveForm(){
  try{
    var d={};
    FKEYS.forEach(function(k){var e=document.getElementById(k);if(e){if(e.type==='checkbox')d[k]=e.checked;else d[k]=e.value;}});
    // refs
    var refs=[];document.querySelectorAll('[id^="ref-"]').forEach(function(div){
      var n=div.id.replace('ref-','');refs.push({v:gv('ref_val_'+n),d:gv('ref_date_'+n)});});
    d.notice_date=(document.getElementById('notice_date')||{value:''}).value;
    d.debt_date1=(document.getElementById('debt_date1')||{value:''}).value;
    d._refs=refs;
    var dbs=[];document.getElementById('debtors-wrap').querySelectorAll('[id^="debtor-"]').forEach(function(div){var n=div.id.replace('debtor-','');dbs.push({name:(document.getElementById('db_name_'+n)||{value:''}).value,addr:(document.getElementById('db_addr_'+n)||{value:''}).value,zip:(document.getElementById('db_zip_'+n)||{value:''}).value,tel:(document.getElementById('db_tel_'+n)||{value:''}).value});});d._debtors=dbs;
    // loans
    var loans=[];document.querySelectorAll('[id^="loan-"]').forEach(function(div){
      var n=div.id.replace('loan-','');loans.push({a:gv('loan_amt_'+n),at:gv('loan_amt_t_'+n),d:gv('loan_date_'+n)});});
    d._loans=loans;
    localStorage.setItem(LS,JSON.stringify(d));
  }catch(e){}
}
function restoreForm(){
  try{
    var s=localStorage.getItem(LS);if(!s)return;
    var d=JSON.parse(s);
    FKEYS.forEach(function(k){var e=document.getElementById(k);if(e&&d[k]!==undefined)e.value=d[k];});
    if(d._refs)d._refs.forEach(function(r){addRef(r.v,r.d);});
    if(d._loans)d._loans.forEach(function(l){addExtraLoan(l.a,l.at,l.d);});
    if(d._debtors&&d._debtors.length){d._debtors.forEach(function(db){addDebtor(db);});}
    if(d.notice_date) setTimeout(function(){tdpSetValue('notice_date',d.notice_date);},150);
    if(d.debt_date1)  setTimeout(function(){tdpSetValue('debt_date1',d.debt_date1);},150);
    onTypeChange(gv('notice_type'));
  }catch(e){}
}
setInterval(saveForm,2000);
window.addEventListener('beforeunload',saveForm);
setTimeout(function(){
  restoreForm();
  // default ref
  if(!document.querySelectorAll('[id^="ref-"]').length){
    var t=document.getElementById('notice_type')?document.getElementById('notice_type').value:'mortgage';
    addRef(DEFAULT_REFS[t]||DEFAULT_REFS.mortgage,'');
  }
  // default debtor
  if(!document.getElementById('debtors-wrap').children.length) addDebtor();
},100);

// ── Date quick-type (DDMMYYYY พ.ศ.) ──
function dqType(qid,did){
  var q=document.getElementById(qid);
  var d=document.getElementById(did);
  if(!q||!d)return;
  var raw=q.value.replace(/[^0-9]/g,'').slice(0,8);
  // format
  var s='';
  if(raw.length>0)s=raw.slice(0,2);
  if(raw.length>2)s+='/'+raw.slice(2,4);
  if(raw.length>4)s+='/'+raw.slice(4,8);
  q.value=s;
  q.className=q.className.replace(/\b(ok|er)\b/g,'').trim();
  if(raw.length===8){
    var dd=raw.slice(0,2),mm=raw.slice(2,4),yyyy_be=parseInt(raw.slice(4,8)),yyyy=yyyy_be-543;
    var iso=yyyy+'-'+mm+'-'+dd;
    var t=new Date(iso+'T00:00:00');
    if(!isNaN(t.getTime())&&t.getFullYear()===yyyy){
      d.value=iso;
      d.dispatchEvent(new Event('change'));
      q.classList.add('ok');
    } else { q.classList.add('er'); }
  }
}
function dqSync(qid,did){
  var d=document.getElementById(did);
  var q=document.getElementById(qid);
  if(!d||!q||!d.value)return;
  var p=d.value.split('-');
  if(p.length!==3)return;
  q.value=p[2]+'/'+p[1]+'/'+(parseInt(p[0])+543);
  q.className=q.className.replace(/\b(ok|er)\b/g,'').trim()+' ok';
}


// ── Thai Date Picker ──
var _tdpOpen=null;
var THMONTHS_F=['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];

function _tdpFmt(iso){
  if(!iso)return '';
  var p=iso.split('-');if(p.length!==3)return '';
  return parseInt(p[2])+' '+THMONTHS_F[parseInt(p[1])-1]+' '+(parseInt(p[0])+543);
}


function _tdpWireEvents(did){
  var inp=document.getElementById('tdpi_'+did);
  var icon=inp?inp.parentElement.querySelector('.tdp-icon'):null;
  var drop=document.getElementById('tdpd_'+did);
  if(!inp)return;
  inp.onfocus=function(){tdpFocus(did);};
  inp.onkeydown=function(e){tdpKeydown(did,e);};
  if(icon) icon.onclick=function(e){e.stopPropagation();tdpOpen(did);};
  if(drop){
    var btns=drop.querySelectorAll('.tdp-nav button');
    if(btns[0]) btns[0].onclick=function(e){e.stopPropagation();tdpNav(did,-1,e);};
    if(btns[1]) btns[1].onclick=function(e){e.stopPropagation();tdpNav(did,1,e);};
    var my=drop.querySelector('.tdp-my');
    if(my) my.onclick=function(e){e.stopPropagation();tdpToggleYM(did);};
  }
}

function tdpInit(did,onchange){
  var wrap=document.getElementById('tdpw_'+did);
  if(!wrap||wrap._tdp)return;
  var today=new Date();
  wrap._tdp={did:did,cur:{y:today.getFullYear(),m:today.getMonth()},sel:null,onchange:onchange||null,ymMode:false,typing:''};
  _tdpRender(did);
}

function _tdpRender(did){
  var wrap=document.getElementById('tdpw_'+did);
  if(!wrap||!wrap._tdp)return;
  var s=wrap._tdp;
  var drop=document.getElementById('tdpd_'+did);
  if(!drop)return;
  var y=s.cur.y,m=s.cur.m,be=y+543;
  drop.querySelector('.tdp-my').textContent=THMONTHS_F[m]+' '+be;
  var daysDiv=drop.querySelector('.tdp-days');
  daysDiv.innerHTML='';
  var first=new Date(y,m,1).getDay();
  var last=new Date(y,m+1,0).getDate();
  var today=new Date();
  for(var i=0;i<first;i++){var e=document.createElement('button');e.className='tdp-day empty';e.textContent='';daysDiv.appendChild(e);}
  for(var d=1;d<=last;d++){
    var btn=document.createElement('button');
    btn.className='tdp-day';btn.textContent=d;
    var iso=y+'-'+(m+1<10?'0':'')+(m+1)+'-'+(d<10?'0':'')+d;
    if(today.getFullYear()===y&&today.getMonth()===m&&today.getDate()===d)btn.classList.add('today');
    if(s.sel===iso)btn.classList.add('sel');
    btn.onclick=(function(v){return function(e){e.stopPropagation();tdpSelect(did,v);};})(iso);
    daysDiv.appendChild(btn);
  }
}

function _tdpBuildYM(did){
  var wrap=document.getElementById('tdpw_'+did);
  var drop=document.getElementById('tdpd_'+did);
  if(!wrap||!drop)return;
  var s=wrap._tdp;
  var ymDiv=drop.querySelector('.tdp-ym');
  var ysel='<select onchange="tdpYMChange(\''+did+'\',\'y\',this.value)">';
  var curBE=s.cur.y+543;
  for(var be=2540;be<=2590;be++){ysel+='<option value="'+(be-543)+'"'+(be===curBE?' selected':'')+'>'+be+'</option>';}
  ysel+='</select>';
  var msel='<select onchange="tdpYMChange(\''+did+'\',\'m\',this.value)">';
  for(var mi=0;mi<12;mi++){msel+='<option value="'+mi+'"'+(mi===s.cur.m?' selected':'')+'>'+THMONTHS_F[mi]+'</option>';}
  msel+='</select>';
  ymDiv.innerHTML=ysel+msel;
}

function tdpYMChange(did,type,val){
  var wrap=document.getElementById('tdpw_'+did);
  if(!wrap||!wrap._tdp)return;
  wrap._tdp.cur[type==='y'?'y':'m']=parseInt(val);
  _tdpRender(did);
}

function tdpToggleYM(did){
  var wrap=document.getElementById('tdpw_'+did);
  var drop=document.getElementById('tdpd_'+did);
  if(!wrap||!drop||!wrap._tdp)return;
  var s=wrap._tdp;
  s.ymMode=!s.ymMode;
  var cal=drop.querySelector('.tdp-days-hdr');
  var days=drop.querySelector('.tdp-days');
  var ym=drop.querySelector('.tdp-ym');
  if(s.ymMode){cal.style.display='none';days.style.display='none';ym.className='tdp-ym open';_tdpBuildYM(did);}
  else{cal.style.display='';days.style.display='';ym.className='tdp-ym';}
}

function tdpSelect(did,iso){
  var wrap=document.getElementById('tdpw_'+did);
  if(!wrap||!wrap._tdp)return;
  var s=wrap._tdp;
  s.sel=iso;s.typing='';
  var hid=document.getElementById(did);
  if(hid){hid.value=iso;hid.dispatchEvent(new Event('change'));}
  var inp=document.getElementById('tdpi_'+did);
  if(inp){inp.value=_tdpFmt(iso);inp.classList.remove('er');inp.classList.add('ok');}
  _tdpRender(did);
  tdpClose();
  if(s.onchange)try{eval(s.onchange);}catch(e){}
}

function tdpOpen(did){
  tdpClose();
  var drop=document.getElementById('tdpd_'+did);
  if(drop){drop.classList.add('open');_tdpOpen=did;}
  var wrap=document.getElementById('tdpw_'+did);
  var hid=document.getElementById(did);
  if(wrap&&hid&&hid.value){
    var p=hid.value.split('-');
    if(p.length===3){wrap._tdp.cur.y=parseInt(p[0]);wrap._tdp.cur.m=parseInt(p[1])-1;wrap._tdp.sel=hid.value;_tdpRender(did);}
  }
}

function tdpClose(){
  if(_tdpOpen){var d=document.getElementById('tdpd_'+_tdpOpen);if(d)d.classList.remove('open');_tdpOpen=null;}
}

function tdpNav(did,delta,e){
  if(e)e.stopPropagation();
  var wrap=document.getElementById('tdpw_'+did);
  if(!wrap||!wrap._tdp)return;
  var s=wrap._tdp;
  s.cur.m+=delta;
  if(s.cur.m<0){s.cur.m=11;s.cur.y--;}
  if(s.cur.m>11){s.cur.m=0;s.cur.y++;}
  _tdpRender(did);
}

// ── พิมพ์ในช่องหลักโดยตรง ──
function tdpKeydown(did,e){
  var inp=document.getElementById('tdpi_'+did);
  var wrap=document.getElementById('tdpw_'+did);
  if(!inp||!wrap||!wrap._tdp)return;
  var s=wrap._tdp;
  var k=e.key;
  // Backspace
  if(k==='Backspace'){
    if(s.typing.length>0){s.typing=s.typing.slice(0,-1);}
    else{tdpSelect(did,'');inp.value='';inp.classList.remove('ok','er');}
    _tdpShowTyping(did);
    e.preventDefault();return;
  }
  // Tab/Escape
  if(k==='Tab'||k==='Escape'){tdpClose();return;}
  // เลขอย่างเดียว
  if(!/^[0-9]$/.test(k)){e.preventDefault();return;}
  s.typing=(s.typing||'')+k;
  _tdpShowTyping(did);
  e.preventDefault();
}

function _tdpShowTyping(did){
  var s=document.getElementById('tdpw_'+did)._tdp;
  var inp=document.getElementById('tdpi_'+did);
  var raw=s.typing||'';
  // format DD/MM/YYYY
  var disp='';
  if(raw.length>0)disp=raw.slice(0,2);
  if(raw.length>2)disp+='/'+raw.slice(2,4);
  if(raw.length>4)disp+='/'+raw.slice(4,8);
  if(raw.length===0)disp=s.sel?_tdpFmt(document.getElementById(s.did)?document.getElementById(s.did).value:''):'';
  inp.value=disp||'';
  inp.classList.remove('ok','er');
  // ครบ 8 ตัว → parse
  if(raw.length===8){
    var dd=raw.slice(0,2),mm=raw.slice(2,4),be=parseInt(raw.slice(4,8)),ad=be-543;
    var iso=ad+'-'+mm+'-'+dd;
    var t=new Date(iso+'T00:00:00');
    if(!isNaN(t.getTime())&&t.getFullYear()===ad){
      tdpSelect(did,iso);
      document.getElementById('tdpw_'+did)._tdp.typing='';
    } else {
      inp.classList.add('er');
    }
  }
}

function tdpFocus(did){
  var wrap=document.getElementById('tdpw_'+did);
  if(wrap&&wrap._tdp){wrap._tdp.typing='';}
  tdpOpen(did);
}

function tdpSetValue(did,iso){
  if(!iso)return;
  var hid=document.getElementById(did);if(hid)hid.value=iso;
  var inp=document.getElementById('tdpi_'+did);
  if(inp){inp.value=_tdpFmt(iso);inp.classList.remove('er');inp.classList.add('ok');}
  var wrap=document.getElementById('tdpw_'+did);
  if(wrap&&wrap._tdp){
    wrap._tdp.sel=iso;wrap._tdp.typing='';
    var p=iso.split('-');if(p.length===3){wrap._tdp.cur.y=parseInt(p[0]);wrap._tdp.cur.m=parseInt(p[1])-1;}
  }
}

// wire static date pickers
setTimeout(function(){
  document.querySelectorAll('.tdp-wrap[id^="tdpw_"]').forEach(function(w){
    var did=w.id.replace('tdpw_','');
    _tdpWireEvents(did);
  });
},200);

document.addEventListener('click',function(e){
  if(_tdpOpen&&!e.target.closest('#tdpw_'+_tdpOpen))tdpClose();
});

</script>
