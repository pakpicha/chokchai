<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ใบสำคัญจ่ายทั่วไป — โชคชัย เงินด่วน</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'TH Sarabun New','Sarabun',Arial,sans-serif;font-size:15px;background:#f0f0eb;color:#111}
.wrap{max-width:700px;margin:0 auto;padding:16px}
.card{background:#fff;border-radius:14px;padding:18px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.ct{font-size:13px;font-weight:700;color:#1a3a2a;background:#e8f5e8;border-radius:8px;padding:6px 12px;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.ct .n{background:#1a3a2a;color:#fff;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0}
.fg{margin-bottom:10px}
.fg label{display:block;font-size:12px;color:#555;margin-bottom:4px;font-weight:600}
.fg input,.fg select,.fg textarea{width:100%;padding:10px 11px;font-size:15px;border:1px solid #ccc;border-radius:8px;font-family:inherit;background:#fafaf7}
.fg input:focus,.fg select:focus{outline:none;border-color:#1a3a2a}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.pay-row{border:1px solid #dde8dd;border-radius:10px;padding:12px;margin-bottom:8px;background:#fafaf7}
.pay-row .ph{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.pay-row .ph select{flex:1;padding:8px;font-size:14px;border:1px solid #ccc;border-radius:6px;font-family:inherit}
.pay-row .ph button{background:#fee;border:1px solid #fcc;border-radius:6px;color:#c00;padding:6px 10px;cursor:pointer;font-size:13px}
.pay-row .pay-fields{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.pay-row .pay-fields label{font-size:12px;color:#555;font-weight:600}
.pay-row .pay-fields input{width:100%;padding:8px;font-size:14px;border:1px solid #ccc;border-radius:6px;font-family:inherit}
.pay-row .pay-fields .full{grid-column:1/-1}
.wht-row{display:flex;align-items:center;gap:8px;margin-top:6px;flex-wrap:wrap}
.wht-row label{font-size:12px;color:#555;font-weight:600;white-space:nowrap}
.wht-row select{padding:6px 8px;font-size:13px;border:1px solid #ccc;border-radius:6px;font-family:inherit}
.wht-row input{width:100px;padding:6px 8px;font-size:13px;border:1px solid #ccc;border-radius:6px;font-family:inherit}
.wht-row .wht-result{font-size:13px;color:#c00;font-weight:700;min-width:80px}
.add-btn{width:100%;padding:11px;background:#e8f5e8;border:2px dashed #4caf50;border-radius:8px;font-size:14px;font-family:inherit;color:#1a3a2a;font-weight:700;cursor:pointer;margin-top:4px}
.gen-btn{width:100%;padding:14px;background:#1a3a2a;color:#fff;border:none;border-radius:10px;font-size:16px;font-family:inherit;font-weight:700;cursor:pointer;margin-top:8px}
.gen-btn:active{opacity:.85}
@media print{
  body{background:#fff}
  .no-print{display:none!important}
  .doc-page{page-break-after:always}
}
/* doc styles */
.doc{font-family:'TH Sarabun New','Sarabun',Arial,sans-serif;font-size:13pt;color:#000;background:#fff}
.doc table{border-collapse:collapse;width:100%}



/* ── Thai Date Picker ── */
.tdp-wrap{position:relative;display:inline-block;width:100%}
.tdp-input{width:100%;padding:9px 36px 9px 11px;font-size:15px;border:1px solid #ccc;
  border-radius:8px;font-family:inherit;background:#fafaf7;box-sizing:border-box;cursor:text}
.tdp-input.ok{border-color:#4caf50;background:#f7fcf7}
.tdp-input.er{border-color:#e74c3c;background:#fff5f5}
.tdp-icon{position:absolute;right:10px;top:50%;transform:translateY(-50%);
  font-size:16px;cursor:pointer;color:#888;user-select:none}
.tdp-drop{display:none;position:absolute;top:calc(100% + 4px);left:0;z-index:9999;
  background:#fff;border:1px solid #ddd;border-radius:12px;padding:10px;
  box-shadow:0 4px 16px rgba(0,0,0,.15);min-width:260px}
.tdp-drop.open{display:block}
.tdp-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.tdp-nav button{background:none;border:none;cursor:pointer;font-size:18px;color:#1a3a2a;
  padding:4px 8px;border-radius:6px;font-family:inherit}
.tdp-nav button:hover{background:#e8f5e8}
.tdp-nav .tdp-my{font-size:15px;font-weight:700;color:#1a3a2a;cursor:pointer;
  padding:4px 8px;border-radius:6px}
.tdp-nav .tdp-my:hover{background:#e8f5e8}
.tdp-days-hdr{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px}
.tdp-days-hdr span{text-align:center;font-size:11px;color:#888;font-weight:700;padding:2px 0}
.tdp-days{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.tdp-day{text-align:center;padding:6px 2px;font-size:13px;border-radius:6px;cursor:pointer;
  border:none;background:none;font-family:inherit;color:#333;width:100%}
.tdp-day:hover{background:#e8f5e8;color:#1a3a2a}
.tdp-day.today{font-weight:700;color:#1a3a2a}
.tdp-day.sel{background:#1a3a2a!important;color:#fff!important}
.tdp-day.empty{cursor:default;pointer-events:none}
.tdp-ym{display:none;padding:4px}
.tdp-ym.open{display:block}
.tdp-ym select{width:100%;padding:8px;font-size:15px;border:1px solid #ccc;
  border-radius:8px;font-family:inherit;background:#fafaf7;margin-bottom:6px}
.tdp-shortcut{display:flex;gap:6px;margin-top:8px;padding-top:8px;border-top:1px solid #eee}
.tdp-shortcut input{flex:1;padding:7px 10px;font-size:13px;border:1px solid #ddd;
  border-radius:6px;font-family:inherit;background:#fffde7;text-align:center}
.tdp-shortcut span{font-size:11px;color:#999;display:flex;align-items:center;white-space:nowrap}
</style>
</head>
<body>
<div class="wrap no-print">

  <!-- 1. ข้อมูลทั่วไป -->
  <div class="card">
    <div class="ct"><span class="n">1</span> ข้อมูลทั่วไป</div>
    <div class="row2">
      <div class="fg"><label>วันที่</label><div class="tdp-wrap" id="tdpw_gv_date" onclick="event.stopPropagation()"><input type="hidden" id="gv_date"><input type="text" id="tdpi_gv_date" class="tdp-input" placeholder="เลือกหรือพิมพ์วว/ดด/ปปปป" onfocus="tdpFocus('gv_date')" onkeydown="tdpKeydown('gv_date',event)" readonly="false" autocomplete="off"><span class="tdp-icon" onclick="tdpOpen('gv_date')">📅</span><div class="tdp-drop" id="tdpd_gv_date"><div class="tdp-nav"><button onclick="tdpNav('gv_date',-1,event)">‹</button><span class="tdp-my" onclick="tdpToggleYM('gv_date');event.stopPropagation()">...</span><button onclick="tdpNav('gv_date',1,event)">›</button></div><div class="tdp-ym"></div><div class="tdp-days-hdr"><span>อา</span><span>จ</span><span>อ</span><span>พ</span><span>พฤ</span><span>ศ</span><span>ส</span></div><div class="tdp-days"></div></div></div><script>setTimeout(function(){tdpInit("gv_date","");},50);</script></div>
      <div class="fg"><label>บิลที่ของวัน</label><input type="text" id="gv_bill_seq" value="01" placeholder="01"></div>
    </div>
  </div>

  <!-- 2. ผู้รับเงิน -->
  <div class="card">
    <div class="ct"><span class="n">2</span> ผู้รับเงิน</div>
    <div class="fg">
      <label>ประเภทผู้รับเงิน</label>
      <select id="gv_recv_type" onchange="onRecvTypeChange(this.value)" style="padding:10px 11px;font-size:15px;border:1px solid #ccc;border-radius:8px;font-family:inherit;background:#fafaf7;width:100%">
        <option value="custom">กรอกเอง</option>
        <option value="dir">กรรมการ</option>
      </select>
    </div>
    <div id="recv-dir-section" style="display:none">
      <div class="fg">
        <label>เลือกกรรมการ</label>
        <select id="gv_dir_sel" onchange="onDirSelect(this.value)" style="padding:10px 11px;font-size:15px;border:1px solid #ccc;border-radius:8px;font-family:inherit;background:#fafaf7;width:100%">
          <option value="">-- เลือก --</option>
          <option value="นายกันตพัฒน์ จรัสบวรพันธ์">นายกันตพัฒน์ จรัสบวรพันธ์</option>
          <option value="นางชญาน์นัทช์ จรัสบวรพันธ์">นางชญาน์นัทช์ จรัสบวรพันธ์</option>
          <option value="นายชุณนเกียรติ จรัสบวรพันธ์">นายชุณนเกียรติ จรัสบวรพันธ์</option>
          <option value="นายฐานวัฒน์ จรัสบวรพันธ์">นายฐานวัฒน์ จรัสบวรพันธ์</option>
          <option value="นางสาวภัคฐ์พิชา จรัสบวรพันธ์">นางสาวภัคฐ์พิชา จรัสบวรพันธ์</option>
        </select>
      </div>
    </div>
    <div class="fg"><label>ชื่อ-นามสกุล ผู้รับเงิน</label><input type="text" id="gv_recv_name" placeholder="ชื่อ-นามสกุล"></div>
    <div class="fg"><label>ที่อยู่ผู้รับเงิน</label><input type="text" id="gv_recv_addr" placeholder="ที่อยู่"></div>
  </div>

  <!-- 3. รายการจ่าย -->
  <div class="card">
    <div class="ct"><span class="n">3</span> รายการจ่ายเงิน</div>
    <div id="gv-pays-wrap"></div>
    <button class="add-btn" onclick="addGvPay()">+ เพิ่มรายการ</button>
  </div>

  <!-- 4. สรุป -->
  <div class="card" id="summary-card">
    <div class="ct"><span class="n">4</span> สรุปยอด</div>
    <div id="summary-detail" style="font-size:14px;line-height:2"></div>
  </div>

  <button class="gen-btn" onclick="genGvVoucher()">🖨 สร้างใบสำคัญจ่าย</button>
</div>

<!-- preview -->
<div id="gv-preview" style="display:none"></div>

<script>
var DIR_ADDR = {
  "นายกันตพัฒน์ จรัสบวรพันธ์":   "248/1 หมู่ที่ 9 ต.ท่าเยี่ยม อ.โชคชัย จ.นครราชสีมา",
  "นางชญาน์นัทช์ จรัสบวรพันธ์":  "247/1 หมู่ที่ 9 ต.ท่าเยี่ยม อ.โชคชัย จ.นครราชสีมา",
  "นายชุณนเกียรติ จรัสบวรพันธ์":  "222/2 หมู่ที่ 11 ต.กระโทก อ.โชคชัย จ.นครราชสีมา",
  "นายฐานวัฒน์ จรัสบวรพันธ์":    "242/6 หมู่ที่ 9 ต.ท่าเยี่ยม อ.โชคชัย จ.นครราชสีมา",
  "นางสาวภัคฐ์พิชา จรัสบวรพันธ์": "256/135 หมู่ที่ 12 ต.โชคชัย อ.โชคชัย จ.นครราชสีมา"
};

var WHT_TYPES = {
  "none":  {label:"ไม่หัก",     rate:0},
  "wht1":  {label:"หัก ณ ที่จ่าย 1%",  rate:0.01},
  "wht3":  {label:"หัก ณ ที่จ่าย 3%",  rate:0.03},
  "wht5":  {label:"หัก ณ ที่จ่าย 5%",  rate:0.05},
  "wht15": {label:"หัก ณ ที่จ่าย 15%", rate:0.15},
  "vat7":  {label:"VAT 7%",            rate:0.07},
  "other": {label:"อื่นๆ (กรอก %)",    rate:0}
};

var payC = 0;

function gv(id){var e=document.getElementById(id);return e?e.value.trim():'';}

function fmtN(s){var n=parseFloat(String(s).replace(/[,\s]/g,''));return isNaN(n)?'':n.toLocaleString('th-TH');}

function toBaht(n){
  n=parseInt(String(n).replace(/[,\s]/g,''));
  if(isNaN(n)||n===0)return '';
  var u=['','หนึ่ง','สอง','สาม','สี่','ห้า','หก','เจ็ด','แปด','เก้า'];
  var p=['','สิบ','ร้อย','พัน','หมื่น','แสน','ล้าน'];
  function toText(n){
    if(n===0)return '';
    if(n>=1000000)return toText(Math.floor(n/1000000))+'ล้าน'+toText(n%1000000);
    var r='',d=String(n).split('');
    d.reverse();
    for(var i=0;i<d.length;i++){
      if(d[i]==='0')continue;
      r=u[parseInt(d[i])]+p[i]+r;
      if(i===1&&d[i]==='1')r='สิบ'+r.slice(2);
      if(i===1&&d[i]==='2')r='ยี่สิบ'+r.slice(4);
    }
    return r;
  }
  return toText(n)+'บาทถ้วน';
}

function shortDate(s){
  if(!s)return '......';
  var p=s.split('-');
  if(p.length!==3)return s;
  var d=parseInt(p[2]),m=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'][parseInt(p[1])-1],y=parseInt(p[0])+543;
  return d+'/'+m+'/'+y;
}

function billNo(dateStr,seq){
  if(!dateStr)return 'PV......-'+(seq||'01');
  var p=dateStr.split('-');
  return 'PV'+(String(parseInt(p[0])+543).slice(-2)||'00')+(p[1]||'00')+(p[2]||'00')+'-'+(seq||'01');
}

function onRecvTypeChange(v){
  document.getElementById('recv-dir-section').style.display = v==='dir'?'block':'none';
  if(v!=='dir'){
    document.getElementById('gv_recv_name').value='';
    document.getElementById('gv_recv_addr').value='';
  }
}

function onDirSelect(v){
  document.getElementById('gv_recv_name').value = v;
  document.getElementById('gv_recv_addr').value = DIR_ADDR[v]||'';
}

function addGvPay(){
  payC++;
  var i=payC;
  var wrap=document.getElementById('gv-pays-wrap');
  var div=document.createElement('div');
  div.id='gvpay-'+i;
  div.className='pay-row';
  div.innerHTML=
    '<div class="ph">'
    +'<select id="gvp_type_'+i+'" onchange="onWhtChange('+i+')">'
    +'<option value="cash">เงินสด</option>'
    +'<option value="draft">ดราฟท์</option>'
    +'<option value="transfer">เงินโอน</option>'
    +'<option value="pn">ตั๋วสัญญาใช้เงิน</option>'
    +'<option value="bankdraft">ดราฟต์ธนาคาร</option>'
    +'<option value="check">เช็ค</option>'
    +'</select>'
    +(i>0?'<button onclick="removeGvPay('+i+')">× ลบ</button>':'')
    +'</div>'
    +'<div class="pay-fields">'
    +'<div class="full fg"><label>รายการ / คำอธิบาย</label><input type="text" id="gvp_label_'+i+'" placeholder="เช่น คืนเงินต้น / ดอกเบี้ย"></div>'
    +'<div class="fg"><label>จำนวนเงิน (บาท)</label><input type="text" id="gvp_amt_'+i+'" inputmode="numeric" placeholder="0" oninput="onAmtChange('+i+')"></div>'
    +'<div class="fg"><label>ตัวอักษร</label><input type="text" id="gvp_amt_t_'+i+'" readonly></div>'
    +'</div>'
    // WHT section
    +'<div class="wht-row">'
    +'<label>หัก ณ ที่จ่าย:</label>'
    +'<select id="gvp_wht_'+i+'" onchange="onWhtChange('+i+')">'
    +'<option value="none">ไม่หัก</option>'
    +'<option value="wht1">1%</option>'
    +'<option value="wht3">3%</option>'
    +'<option value="wht5">5%</option>'
    +'<option value="wht15">15%</option>'
    +'<option value="vat7">VAT 7%</option>'
    +'<option value="other">อื่นๆ</option>'
    +'</select>'
    +'<span id="gvp_wht_other_wrap_'+i+'" style="display:none"><input type="text" id="gvp_wht_pct_'+i+'" placeholder="%" style="width:60px" oninput="onWhtChange('+i+')">%</span>'
    +'<span id="gvp_wht_amt_'+i+'" class="wht-result"></span>'
    +'</div>';
  wrap.appendChild(div);
  updateSummary();
}

function removeGvPay(i){
  var el=document.getElementById('gvpay-'+i);
  if(el){el.remove();updateSummary();}
}

function onAmtChange(i){
  var amt=parseFloat((gv('gvp_amt_'+i)||'0').replace(/,/g,''))||0;
  var el=document.getElementById('gvp_amt_t_'+i);
  if(el)el.value=amt?toBaht(amt):'';
  onWhtChange(i);
}

function onWhtChange(i){
  var whtType=gv('gvp_wht_'+i);
  var otherWrap=document.getElementById('gvp_wht_other_wrap_'+i);
  if(otherWrap)otherWrap.style.display=whtType==='other'?'inline-flex':'none';
  
  var amt=parseFloat((gv('gvp_amt_'+i)||'0').replace(/,/g,''))||0;
  var rate=0;
  if(whtType==='wht1')rate=0.01;
  else if(whtType==='wht3')rate=0.03;
  else if(whtType==='wht5')rate=0.05;
  else if(whtType==='wht15')rate=0.15;
  else if(whtType==='vat7')rate=0.07;
  else if(whtType==='other'){rate=parseFloat(gv('gvp_wht_pct_'+i)||'0')/100||0;}
  
  var whtAmt=Math.round(amt*rate*100)/100;
  var el=document.getElementById('gvp_wht_amt_'+i);
  if(el)el.textContent=whtAmt>0?('หัก '+whtAmt.toLocaleString('th-TH')+' บาท'):'';
  updateSummary();
}

function getPayRows(){
  var rows=[];
  document.querySelectorAll('.pay-row').forEach(function(div){
    var i=div.id.replace('gvpay-','');
    var label=gv('gvp_label_'+i)||'';
    var amt=parseFloat((gv('gvp_amt_'+i)||'0').replace(/,/g,''))||0;
    if(!amt&&!label)return;
    var whtType=gv('gvp_wht_'+i);
    var rate=0;
    if(whtType==='wht1')rate=0.01;
    else if(whtType==='wht3')rate=0.03;
    else if(whtType==='wht5')rate=0.05;
    else if(whtType==='wht15')rate=0.15;
    else if(whtType==='vat7')rate=0.07;
    else if(whtType==='other')rate=parseFloat(gv('gvp_wht_pct_'+i)||'0')/100||0;
    var whtAmt=Math.round(amt*rate*100)/100;
    var whtLabel=whtAmt>0?WHT_TYPES[whtType].label:'';
    rows.push({label:label,amt:amt,whtAmt:whtAmt,whtLabel:whtLabel,rate:rate});
  });
  return rows;
}

function updateSummary(){
  var rows=getPayRows();
  var totalGross=0,totalWht=0;
  rows.forEach(function(r){totalGross+=r.amt;totalWht+=r.whtAmt;});
  var totalNet=totalGross-totalWht;
  var html='';
  rows.forEach(function(r){
    html+='<div>'+r.label+': <b>'+r.amt.toLocaleString('th-TH')+'</b> บาท'+(r.whtAmt>0?' (หัก '+r.whtAmt.toLocaleString('th-TH')+' บาท)':'')+'</div>';
  });
  if(totalWht>0)html+='<div style="color:#c00">รวมหัก: <b>'+totalWht.toLocaleString('th-TH')+'</b> บาท</div>';
  html+='<div style="font-size:16px;font-weight:700;border-top:1px solid #ccc;margin-top:6px;padding-top:6px">ยอดจ่ายสุทธิ: <b>'+totalNet.toLocaleString('th-TH')+'</b> บาท ('+toBaht(Math.round(totalNet))+')</div>';
  document.getElementById('summary-detail').innerHTML=html;
}

function genGvVoucher(){
  var rows=getPayRows();
  var date=gv('gv_date');
  var seq=gv('gv_bill_seq')||'01';
  var no=billNo(date,seq);
  var recvName=gv('gv_recv_name')||'..........';
  var recvAddr=gv('gv_recv_addr')||'';
  
  var totalGross=0,totalWht=0;
  rows.forEach(function(r){totalGross+=r.amt;totalWht+=r.whtAmt;});
  var totalNet=totalGross-totalWht;
  
  var CELL='padding:3pt 5pt;font-size:12pt;';
  
  function copy(lbl){
    // แถวรายการ
    var rowsHTML='';
    rows.forEach(function(r){
      rowsHTML+='<tr>'
        +'<td style="border:1px solid #999;'+CELL+'">'+r.label+'</td>'

// auto-save
var LS_KEY='form_data_ใบสำคัญจ่ายทั่วไป';
function autoSave(){try{var d={};document.querySelectorAll('input[id],select[id]').forEach(function(e){d[e.id]=e.value;});localStorage.setItem(LS_KEY,JSON.stringify(d));}catch(e){}}
function autoRestore(){try{var s=localStorage.getItem(LS_KEY);if(!s)return;var d=JSON.parse(s);Object.keys(d).forEach(function(k){var e=document.getElementById(k);if(e)e.value=d[k];});
    // sync date display
    document.querySelectorAll('input[type="hidden"][id]').forEach(function(d){if(d.value&&document.getElementById('tdpi_'+d.id))tdpSetValue(d.id,d.value);});}catch(e){}}
setInterval(autoSave,2000);
window.addEventListener('beforeunload',autoSave);
setTimeout(autoRestore,100);

// ── Date quick-type (DDMMYYYY พ.ศ.) ──
function dqType(qid,did){
  var q=document.getElementById(qid);
  var d=document.getElementById(did);
  if(!q||!d)return;
  var raw=q.value.replace(/[^0-9]/g,'').slice(0,8);
  var s='';
  if(raw.length>0)s=raw.slice(0,2);
  if(raw.length>2)s+='/'+raw.slice(2,4);
  if(raw.length>4)s+='/'+raw.slice(4,8);
  q.value=s;
  q.className=q.className.replace(/\b(ok|er)\b/g,'').trim();
  if(raw.length===8){
    var dd=raw.slice(0,2),mm=raw.slice(2,4),yyyy=parseInt(raw.slice(4,8))-543;
    var iso=yyyy+'-'+mm+'-'+dd;
    var t=new Date(iso+'T00:00:00');
    if(!isNaN(t.getTime())&&t.getFullYear()===yyyy){
      d.value=iso;d.dispatchEvent(new Event('change'));
      q.classList.add('ok');
    } else { q.classList.add('er'); }
  }
}
function dqSync(qid,did){
  var d=document.getElementById(did);
  var q=document.getElementById(qid);
  if(!d||!q||!d.value)return;
  var p=d.value.split('-');if(p.length!==3)return;
  q.value=p[2]+'/'+p[1]+'/'+(parseInt(p[0])+543);
  q.className=q.className.replace(/\b(ok|er)\b/g,'').trim()+' ok';
}


// ── Thai Date Picker ──
var _tdpOpen=null;
var THMONTHS_F=['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];

function _tdpFmt(iso){
  if(!iso)return '';
  var p=iso.split('-');if(p.length!==3)return '';
  return parseInt(p[2])+' '+THMONTHS_F[parseInt(p[1])-1]+' '+(parseInt(p[0])+543);
}


function _tdpWireEvents(did){
  var inp=document.getElementById('tdpi_'+did);
  var icon=inp?inp.parentElement.querySelector('.tdp-icon'):null;
  var drop=document.getElementById('tdpd_'+did);
  if(!inp)return;
  inp.onfocus=function(){tdpFocus(did);};
  inp.onkeydown=function(e){tdpKeydown(did,e);};
  if(icon) icon.onclick=function(e){e.stopPropagation();tdpOpen(did);};
  if(drop){
    var btns=drop.querySelectorAll('.tdp-nav button');
    if(btns[0]) btns[0].onclick=function(e){e.stopPropagation();tdpNav(did,-1,e);};
    if(btns[1]) btns[1].onclick=function(e){e.stopPropagation();tdpNav(did,1,e);};
    var my=drop.querySelector('.tdp-my');
    if(my) my.onclick=function(e){e.stopPropagation();tdpToggleYM(did);};
  }
}

function tdpInit(did,onchange){
  var wrap=document.getElementById('tdpw_'+did);
  if(!wrap||wrap._tdp)return;
  var today=new Date();
  wrap._tdp={did:did,cur:{y:today.getFullYear(),m:today.getMonth()},sel:null,onchange:onchange||null,ymMode:false,typing:''};
  _tdpRender(did);
}

function _tdpRender(did){
  var wrap=document.getElementById('tdpw_'+did);
  if(!wrap||!wrap._tdp)return;
  var s=wrap._tdp;
  var drop=document.getElementById('tdpd_'+did);
  if(!drop)return;
  var y=s.cur.y,m=s.cur.m,be=y+543;
  drop.querySelector('.tdp-my').textContent=THMONTHS_F[m]+' '+be;
  var daysDiv=drop.querySelector('.tdp-days');
  daysDiv.innerHTML='';
  var first=new Date(y,m,1).getDay();
  var last=new Date(y,m+1,0).getDate();
  var today=new Date();
  for(var i=0;i<first;i++){var e=document.createElement('button');e.className='tdp-day empty';e.textContent='';daysDiv.appendChild(e);}
  for(var d=1;d<=last;d++){
    var btn=document.createElement('button');
    btn.className='tdp-day';btn.textContent=d;
    var iso=y+'-'+(m+1<10?'0':'')+(m+1)+'-'+(d<10?'0':'')+d;
    if(today.getFullYear()===y&&today.getMonth()===m&&today.getDate()===d)btn.classList.add('today');
    if(s.sel===iso)btn.classList.add('sel');
    btn.onclick=(function(v){return function(e){e.stopPropagation();tdpSelect(did,v);};})(iso);
    daysDiv.appendChild(btn);
  }
}

function _tdpBuildYM(did){
  var wrap=document.getElementById('tdpw_'+did);
  var drop=document.getElementById('tdpd_'+did);
  if(!wrap||!drop)return;
  var s=wrap._tdp;
  var ymDiv=drop.querySelector('.tdp-ym');
  var ysel='<select onchange="tdpYMChange(\''+did+'\',\'y\',this.value)">';
  var curBE=s.cur.y+543;
  for(var be=2540;be<=2590;be++){ysel+='<option value="'+(be-543)+'"'+(be===curBE?' selected':'')+'>'+be+'</option>';}
  ysel+='</select>';
  var msel='<select onchange="tdpYMChange(\''+did+'\',\'m\',this.value)">';
  for(var mi=0;mi<12;mi++){msel+='<option value="'+mi+'"'+(mi===s.cur.m?' selected':'')+'>'+THMONTHS_F[mi]+'</option>';}
  msel+='</select>';
  ymDiv.innerHTML=ysel+msel;
}

function tdpYMChange(did,type,val){
  var wrap=document.getElementById('tdpw_'+did);
  if(!wrap||!wrap._tdp)return;
  wrap._tdp.cur[type==='y'?'y':'m']=parseInt(val);
  _tdpRender(did);
}

function tdpToggleYM(did){
  var wrap=document.getElementById('tdpw_'+did);
  var drop=document.getElementById('tdpd_'+did);
  if(!wrap||!drop||!wrap._tdp)return;
  var s=wrap._tdp;
  s.ymMode=!s.ymMode;
  var cal=drop.querySelector('.tdp-days-hdr');
  var days=drop.querySelector('.tdp-days');
  var ym=drop.querySelector('.tdp-ym');
  if(s.ymMode){cal.style.display='none';days.style.display='none';ym.className='tdp-ym open';_tdpBuildYM(did);}
  else{cal.style.display='';days.style.display='';ym.className='tdp-ym';}
}

function tdpSelect(did,iso){
  var wrap=document.getElementById('tdpw_'+did);
  if(!wrap||!wrap._tdp)return;
  var s=wrap._tdp;
  s.sel=iso;s.typing='';
  var hid=document.getElementById(did);
  if(hid){hid.value=iso;hid.dispatchEvent(new Event('change'));}
  var inp=document.getElementById('tdpi_'+did);
  if(inp){inp.value=_tdpFmt(iso);inp.classList.remove('er');inp.classList.add('ok');}
  _tdpRender(did);
  tdpClose();
  if(s.onchange)try{eval(s.onchange);}catch(e){}
}

function tdpOpen(did){
  tdpClose();
  var drop=document.getElementById('tdpd_'+did);
  if(drop){drop.classList.add('open');_tdpOpen=did;}
  var wrap=document.getElementById('tdpw_'+did);
  var hid=document.getElementById(did);
  if(wrap&&hid&&hid.value){
    var p=hid.value.split('-');
    if(p.length===3){wrap._tdp.cur.y=parseInt(p[0]);wrap._tdp.cur.m=parseInt(p[1])-1;wrap._tdp.sel=hid.value;_tdpRender(did);}
  }
}

function tdpClose(){
  if(_tdpOpen){var d=document.getElementById('tdpd_'+_tdpOpen);if(d)d.classList.remove('open');_tdpOpen=null;}
}

function tdpNav(did,delta,e){
  if(e)e.stopPropagation();
  var wrap=document.getElementById('tdpw_'+did);
  if(!wrap||!wrap._tdp)return;
  var s=wrap._tdp;
  s.cur.m+=delta;
  if(s.cur.m<0){s.cur.m=11;s.cur.y--;}
  if(s.cur.m>11){s.cur.m=0;s.cur.y++;}
  _tdpRender(did);
}

// ── พิมพ์ในช่องหลักโดยตรง ──
function tdpKeydown(did,e){
  var inp=document.getElementById('tdpi_'+did);
  var wrap=document.getElementById('tdpw_'+did);
  if(!inp||!wrap||!wrap._tdp)return;
  var s=wrap._tdp;
  var k=e.key;
  // Backspace
  if(k==='Backspace'){
    if(s.typing.length>0){s.typing=s.typing.slice(0,-1);}
    else{tdpSelect(did,'');inp.value='';inp.classList.remove('ok','er');}
    _tdpShowTyping(did);
    e.preventDefault();return;
  }
  // Tab/Escape
  if(k==='Tab'||k==='Escape'){tdpClose();return;}
  // เลขอย่างเดียว
  if(!/^[0-9]$/.test(k)){e.preventDefault();return;}
  s.typing=(s.typing||'')+k;
  _tdpShowTyping(did);
  e.preventDefault();
}

function _tdpShowTyping(did){
  var s=document.getElementById('tdpw_'+did)._tdp;
  var inp=document.getElementById('tdpi_'+did);
  var raw=s.typing||'';
  // format DD/MM/YYYY
  var disp='';
  if(raw.length>0)disp=raw.slice(0,2);
  if(raw.length>2)disp+='/'+raw.slice(2,4);
  if(raw.length>4)disp+='/'+raw.slice(4,8);
  if(raw.length===0)disp=s.sel?_tdpFmt(document.getElementById(s.did)?document.getElementById(s.did).value:''):'';
  inp.value=disp||'';
  inp.classList.remove('ok','er');
  // ครบ 8 ตัว → parse
  if(raw.length===8){
    var dd=raw.slice(0,2),mm=raw.slice(2,4),be=parseInt(raw.slice(4,8)),ad=be-543;
    var iso=ad+'-'+mm+'-'+dd;
    var t=new Date(iso+'T00:00:00');
    if(!isNaN(t.getTime())&&t.getFullYear()===ad){
      tdpSelect(did,iso);
      document.getElementById('tdpw_'+did)._tdp.typing='';
    } else {
      inp.classList.add('er');
    }
  }
}

function tdpFocus(did){
  var wrap=document.getElementById('tdpw_'+did);
  if(wrap&&wrap._tdp){wrap._tdp.typing='';}
  tdpOpen(did);
}

function tdpSetValue(did,iso){
  if(!iso)return;
  var hid=document.getElementById(did);if(hid)hid.value=iso;
  var inp=document.getElementById('tdpi_'+did);
  if(inp){inp.value=_tdpFmt(iso);inp.classList.remove('er');inp.classList.add('ok');}
  var wrap=document.getElementById('tdpw_'+did);
  if(wrap&&wrap._tdp){
    wrap._tdp.sel=iso;wrap._tdp.typing='';
    var p=iso.split('-');if(p.length===3){wrap._tdp.cur.y=parseInt(p[0]);wrap._tdp.cur.m=parseInt(p[1])-1;}
  }
}

setTimeout(function(){
  document.querySelectorAll('.tdp-wrap[id^="tdpw_"]').forEach(function(w){
    var did=w.id.replace('tdpw_','');
    _tdpWireEvents(did);
  });
},200);

document.addEventListener('click',function(e){
  if(_tdpOpen&&!e.target.closest('#tdpw_'+_tdpOpen))tdpClose();
});
